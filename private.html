<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ساحة خاصة</title>
    <link rel="icon" type="image/png" href="images/fav.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@400..700&family=Cairo:wght@300..900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --gold: #e8cb9a;
            --gold-light: #ffe8a0;
            --gold-dark: #c0a060;
            --dark-navy: #0a2348;
            --darker-navy: #060f22;
            --teal: #003443;
            --teal-light: #005566;
            --red: #8b1a1a;
            --red-light: #c0392b;
            --card-bg: rgba(0, 20, 40, 0.88);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'El Messiri', sans-serif;
            background: #0d0d0d;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            position: relative;
            overflow-x: hidden;
            padding-bottom: 40px;
        }

        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 50% 0%, rgba(80, 0, 0, 0.35) 0%, transparent 60%),
                radial-gradient(ellipse at 20% 80%, rgba(10, 35, 72, 0.5) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 50%, rgba(30, 5, 5, 0.4) 0%, transparent 50%),
                #0d0d0d;
        }

        .bats {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 180px;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .bat {
            position: absolute;
            font-size: 1.2rem;
            opacity: 0.18;
            animation: batFly linear infinite;
        }

        .bat:nth-child(1) {
            top: 12%;
            left: 8%;
            animation-duration: 8s;
            animation-delay: 0s;
        }

        .bat:nth-child(2) {
            top: 6%;
            left: 25%;
            animation-duration: 11s;
            animation-delay: 2s;
            font-size: 0.9rem;
        }

        .bat:nth-child(3) {
            top: 18%;
            left: 55%;
            animation-duration: 9s;
            animation-delay: 1s;
        }

        .bat:nth-child(4) {
            top: 4%;
            left: 72%;
            animation-duration: 13s;
            animation-delay: 3s;
            font-size: 0.8rem;
        }

        .bat:nth-child(5) {
            top: 14%;
            left: 88%;
            animation-duration: 7s;
            animation-delay: 0.5s;
        }

        .bat:nth-child(6) {
            top: 22%;
            left: 40%;
            animation-duration: 10s;
            animation-delay: 4s;
            font-size: 1rem;
        }

        @keyframes batFly {
            0% {
                transform: translateX(0) translateY(0) scaleX(1);
            }

            25% {
                transform: translateX(20px) translateY(-8px) scaleX(1);
            }

            50% {
                transform: translateX(0px) translateY(0px) scaleX(-1);
            }

            75% {
                transform: translateX(-20px) translateY(-6px) scaleX(-1);
            }

            100% {
                transform: translateX(0) translateY(0) scaleX(1);
            }
        }

        .web-tl,
        .web-tr {
            position: fixed;
            top: 0;
            width: 120px;
            height: 120px;
            z-index: 1;
            pointer-events: none;
            opacity: 0.12;
        }

        .web-tl {
            left: 0;
        }

        .web-tr {
            right: 0;
            transform: scaleX(-1);
        }

        .header {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 28px 20px 10px;
            width: 100%;
        }

        .header-title {
            font-size: clamp(1.8rem, 6vw, 2.6rem);
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(180, 0, 0, 0.6), 0 2px 4px rgba(0, 0, 0, 0.8);
            font-family: 'El Messiri', sans-serif;
        }

        .header-title::after {
            content: '';
            display: block;
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #8b1a1a, #c0392b, #8b1a1a, transparent);
            margin: 10px auto 0;
        }

        .header-sub {
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.78rem;
            margin-top: 6px;
            letter-spacing: 2px;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 420px;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            animation: fadeSlideUp 0.5s ease forwards;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .control-card {
            background: var(--card-bg);
            border: 1px solid rgba(139, 26, 26, 0.4);
            border-radius: 18px;
            overflow: hidden;
            backdrop-filter: blur(16px);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }

        .card-header {
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(139, 26, 26, 0.25);
            background: rgba(139, 26, 26, 0.08);
        }

        .card-icon {
            width: 34px;
            height: 34px;
            background: #003443;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            border: 1px solid #0b6680;
            flex-shrink: 0;
        }

        .card-title {
            color: #e8c0a0;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .card-body {
            padding: 20px 18px;
        }

        .counter-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
        }

        .counter-label {
            color: rgba(255, 255, 255, 0.75);
            font-size: 1rem;
            font-weight: 600;
            flex: 1;
            text-align: right;
        }

        .counter-control {
            display: flex;
            align-items: center;
            gap: 0;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid #003443;
            border-radius: 12px;
            overflow: hidden;
        }

        .counter-btn {
            width: 42px;
            height: 42px;
            background: #003443;
            border: none;
            color: #e8c0a0;
            font-size: 1.3rem;
            cursor: pointer;
            font-family: 'El Messiri', sans-serif;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .counter-btn:hover {
            background: #003443;
            color: #fff;
        }

        .counter-btn:active {
            transform: scale(0.92);
        }

        .counter-value {
            width: 54px;
            height: 42px;
            background: rgba(0, 0, 0, 0.5);
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: 700;
            text-align: center;
            border: none;
            border-right: 1px solid #003443;
            border-left: 1px solid #003443;
            outline: none;
            font-family: 'Cairo', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── Questions progress bar ── */
        .questions-bar-wrap {
            margin-top: 14px;
        }

        .questions-bar-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.72rem;
            color: rgba(255, 255, 255, 0.35);
            margin-bottom: 5px;
            font-family: 'Cairo', sans-serif;
        }

        .questions-bar-bg {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.07);
            border-radius: 10px;
            overflow: hidden;
        }

        .questions-bar-fill {
            height: 100%;
            border-radius: 10px;
            background: linear-gradient(90deg, #003443, #0b6680);
            transition: width 0.3s ease;
        }

        .questions-range-hint {
            text-align: center;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 8px;
            font-family: 'Cairo', sans-serif;
        }

        .players-visual {
            display: flex;
            gap: 6px;
            margin-top: 12px;
            justify-content: center;
            flex-wrap: wrap;
            min-height: 36px;
        }

        .player-icon {
            font-size: 1.4rem;
            transition: all 0.3s ease;
            animation: popIn 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes popIn {
            from {
                transform: scale(0);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .code-card .card-body {
            padding: 20px 18px 22px;
        }

        .code-hint {
            color: white;
            font-size: 0.75rem;
            text-align: center;
            margin-top: 10px;
            line-height: 1.6;
        }

        .code-input-wrap {
            position: relative;
        }

        .code-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.55);
            border: 2px solid #003443;
            border-radius: 12px;
            padding: 13px 16px;
            color: #e8c0a0;
            font-family: 'Cairo', monospace;
            margin-bottom: 5px;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 4px;
            outline: none;
            text-align: center;
            transition: all 0.25s;
        }

        .code-input::placeholder {
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 2px;
            font-size: 0.9rem;
            font-weight: 400;
        }

        .code-input:focus {
            border-color: rgba(200, 60, 60, 0.7);
            background: rgba(50, 0, 0, 0.4);
            box-shadow: 0 0 0 3px rgba(139, 26, 26, 0.15), 0 0 20px rgba(139, 26, 26, 0.2);
        }

        .save-btn {
            width: 100%;
            padding: 15px;
            background: #003443;
            border: 1px solid #003443;
            border-radius: 14px;
            color: #ffffff;
            font-family: 'El Messiri', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(139, 26, 26, 0.4);
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px #003443;
            background: #003443;
        }

        .save-btn:active {
            transform: translateY(0);
        }

        .save-btn .btn-shine {
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transform: skewX(-20deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% {
                left: -100%;
            }

            50%,
            100% {
                left: 150%;
            }
        }

        .back-btn {
            display: block;
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.82rem;
            cursor: pointer;
            background: none;
            border: none;
            font-family: 'El Messiri', sans-serif;
            margin-top: 4px;
            transition: color 0.2s;
            letter-spacing: 0.5px;
            width: 100%;
            padding: 8px;
        }

        .back-btn:hover {
            color: #e8c0a0;
        }

        .success-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
        }

        .success-overlay.active {
            display: flex;
        }

        .success-box {
            background: linear-gradient(135deg, #1a0000, #0d0d0d);
            border: 1px solid #003443;
            border-radius: 22px;
            padding: 40px 30px;
            text-align: center;
            max-width: 320px;
            width: 90%;
            animation: popIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 0 60px rgba(139, 26, 26, 0.3);
        }

        .success-icon {
            font-size: 3.5rem;
            display: block;
            margin-bottom: 14px;
        }

        .success-title {
            color: #e8c0a0;
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .success-sub {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.88rem;
            line-height: 1.7;
            margin-bottom: 24px;
        }

        .success-details {
            background: rgba(139, 26, 26, 0.12);
            border: 1px solid rgba(139, 26, 26, 0.25);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            text-align: right;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .success-detail-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .success-detail-row span:last-child {
            color: #e8c0a0;
            font-weight: 700;
        }

        .success-go-btn {
            display: inline-block;
            padding: 12px 32px;
            background: #003443;
            border-radius: 12px;
            color: #ffffff;
            font-family: 'El Messiri', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: all 0.25s;
            letter-spacing: 1px;
        }

        .success-go-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(192, 57, 43, 0.45);
        }

        .section-divider {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 4px;
        }

        .section-divider::before,
        .section-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(139, 26, 26, 0.4), transparent);
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-6px);
            }

            40% {
                transform: translateX(6px);
            }

            60% {
                transform: translateX(-4px);
            }

            80% {
                transform: translateX(4px);
            }
        }

        .shake {
            animation: shake 0.4s ease;
        }

        #myVideo {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100% !important;
            min-height: 99% !important;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: fill !important;
            z-index: 1;
            width: 100% !important;
            height: 100% !important;
        }

        .lantern {
            z-index: 99;
            font-size: 2.4rem;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 0 8px rgba(232, 203, 154, 0.5));
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) rotate(-5deg);
            }

            50% {
                transform: translateY(-8px) rotate(5deg);
            }
        }

        .lantern img {
            width: 50px;
            filter: drop-shadow(0 0 8px rgba(232, 203, 154, 0.5));
        }

        .main-btn,
        .copy-btn {
            display: inline-block;
            padding: 12px 25px;
            background: #003443;
            border-radius: 12px;
            color: #ffffff;
            font-family: 'El Messiri', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: all 0.25s;
            width: 50%;
            letter-spacing: 1px;
        }

        .code-btns {
            display: flex;
            align-items: center;
            width: 100%;
            gap: 5px;
        }

        input {
            background: black;
            width: 100%;
            border: 0;
            height: 42px;
            padding: 8px;
            text-align: center;
            color: white;
            font-size: 16px;
            font-family: 'El Messiri', sans-serif;
        }

        .back---btn {
            position: fixed;
            z-index: 99999;
            right: 5%;
            top: 3%;
        }

        .back-btn-left {
            position: fixed;
            z-index: 99999;
            left: 5%;
            top: 3%;
        }
    </style>
</head>

<body>

    <div class="back---btn">
        <a href="play.html">
            <img src="images/next.png" class="back-img" alt="">
        </a>
    </div>
    <div class="back-btn-left">
        <a href="index.html">
            <img src="images/home-kh.png" class="back-img" alt="">
        </a>
    </div>

    <div style="width: 100%; height: 100%;">
        <video id="myVideo" loop autoplay>
            <source id="videoSource" src="./assets/video-2.mp4" type="video/mp4">
        </video>
    </div>
    <div class="bg-layer"></div>

    <!-- Header -->
    <div class="header">
        <div class="header-title">أنشئ مغامرة</div>
        <div class="header-sub">حدّد إعدادات المعركة</div>
    </div>
    <span class="lantern">
        <img src="images/animated-logo2.gif" alt="">
    </span>

    <!-- Main content -->
    <div class="container">

        <!-- عنوان المغامرة -->
        <div class="control-card">
            <div class="card-header">
                <div class="card-icon">⚔️</div>
                <span class="card-title">عنوان المغامرة</span>
            </div>
            <div class="card-body">
                <div class="counter-row">
                    <div class="counter-control" style="width: 100%;">
                        <input type="text" id="title" class="counter-input" placeholder="ادخل عنوان المغامرة" />
                    </div>
                </div>
            </div>
        </div>

        <!-- عدد الجولات -->
        <div class="control-card">
            <div class="card-header">
                <div class="card-icon">⚔️</div>
                <span class="card-title">عدد الجولات</span>
            </div>
            <div class="card-body">
                <div class="counter-row">
                    <span class="counter-label">الجولات</span>
                    <div class="counter-control">
                        <button class="counter-btn" onclick="change('rounds', -1)">−</button>
                        <div class="counter-value" id="roundsVal">1</div>
                        <button class="counter-btn" onclick="change('rounds', 1)">+</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- عدد الأسئلة -->
        <div class="control-card">
            <div class="card-header">
                <div class="card-icon">❓</div>
                <span class="card-title">عدد الأسئلة</span>
            </div>
            <div class="card-body">
                <div class="counter-row">
                    <span class="counter-label">الأسئلة</span>
                    <div class="counter-control">
                        <button class="counter-btn" onclick="change('questions', -5)">−</button>
                        <div class="counter-value" id="questionsVal" style="width: 64px; font-size: 1.1rem;">5</div>
                        <button class="counter-btn" onclick="change('questions', 5)">+</button>
                    </div>
                </div>
                <div class="questions-bar-wrap">
                    <div class="questions-bar-labels"><span>5</span><span>30</span></div>
                    <div class="questions-bar-bg">
                        <div class="questions-bar-fill" id="questionsBar" style="width: 0%;"></div>
                    </div>
                    <div class="questions-range-hint">من 5 إلى 30 سؤالاً • كل ضغطة تضيف 5 أسئلة</div>
                </div>
            </div>
        </div>

        <!-- عدد الفرق -->
        <div class="control-card">
            <div class="card-header">
                <div class="card-icon">👥</div>
                <span class="card-title">عدد الفرق</span>
            </div>
            <div class="card-body">
                <div class="counter-row">
                    <span class="counter-label">الفرق</span>
                    <div class="counter-control">
                        <button class="counter-btn" onclick="change('teams', -1)">−</button>
                        <div class="counter-value" id="teamsVal">2</div>
                        <button class="counter-btn" onclick="change('teams', 1)">+</button>
                    </div>
                </div>
                <div class="players-visual" id="teamsVisual"></div>
            </div>
        </div>

        <!-- عدد المغامرين -->
        <div class="control-card">
            <div class="card-header">
                <div class="card-icon">👥</div>
                <span class="card-title">عدد المغامرين لكل فريق</span>
            </div>
            <div class="card-body">
                <div class="counter-row">
                    <span class="counter-label">عدد المغامرين</span>
                    <div class="counter-control">
                        <button class="counter-btn" onclick="change('players', -1)">−</button>
                        <div class="counter-value" id="playersVal">1</div>
                        <button class="counter-btn" onclick="change('players', 1)">+</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Save button -->
        <button class="save-btn" onclick="saveSettings()">
            <span class="btn-shine"></span>
            حفظ والمتابعة
        </button>

    </div>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <script>
        const state = {
            rounds: 1, teams: 2, players: 1, questions: 5,
        };
        const limits = {
            rounds: { min: 1, max: 10 }, teams: { min: 2, max: 4 },
            players: { min: 1, max: 2 }, questions: { min: 5, max: 30 },
        };
        const teamEmojis = ['🟥', '🟦', '🟩', '🟨'];

        function change(key, delta) {
            state[key] = Math.min(limits[key].max, Math.max(limits[key].min, state[key] + delta));
            document.getElementById(key + 'Val').textContent = state[key];
            if (key === 'teams') renderTeams();
            if (key === 'questions') updateQuestionsBar();
        }

        function updateQuestionsBar() {
            const pct = ((state.questions - 5) / (30 - 5)) * 100;
            document.getElementById('questionsBar').style.width = pct + '%';
        }

        function renderTeams() {
            const visual = document.getElementById('teamsVisual');
            visual.innerHTML = '';
            for (let i = 0; i < state.teams; i++) {
                const span = document.createElement('span');
                span.className = 'player-icon';
                span.textContent = teamEmojis[i] || '🔲';
                span.style.animationDelay = (i * 0.05) + 's';
                visual.appendChild(span);
            }
        }

        renderTeams();
        updateQuestionsBar();

        // ── Save Settings → خزّن وانتقل لاختيار نوع الأسئلة ──
        function saveSettings() {
            const title = document.getElementById('title').value.trim();
            if (!title) {
                const inp = document.getElementById('title');
                inp.style.borderColor = 'rgba(230,50,50,0.8)';
                setTimeout(() => inp.style.borderColor = '', 1500);
                return;
            }

            // خزّن كل إعدادات اللعبة
            localStorage.setItem('game_title', title);
            localStorage.setItem('game_rounds', state.rounds);
            localStorage.setItem('game_questions', state.questions);
            localStorage.setItem('game_teams', state.teams);
            localStorage.setItem('game_players', state.players);

            window.location.href = 'question-type.html';
        }
    </script>
</body>

</html>
