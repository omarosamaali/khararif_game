<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ساحة خاصة</title>
    <link rel="icon" type="image/png" href="images/fav.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@400..700&family=Cairo:wght@300..900&display=swap"
        rel="stylesheet">

    <link href="style.css" rel="stylesheet" type="text/css" />
    <style>
        :root {
            --gold: #e8cb9a;
            --gold-light: #ffe8a0;
            --gold-dark: #c0a060;
            --dark-navy: #0a2348;
            --darker-navy: #060f22;
            --teal: #003443;
            --teal-light: #005566;
            --red: #8b1a1a;
            --red-light: #c0392b;
            --card-bg: rgba(0, 20, 40, 0.88);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'El Messiri', sans-serif;
            background: #0d0d0d;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            position: relative;
            overflow-x: hidden;
            padding-bottom: 40px;
        }

        /* ── Dark gothic background ── */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 50% 0%, rgba(80, 0, 0, 0.35) 0%, transparent 60%),
                radial-gradient(ellipse at 20% 80%, rgba(10, 35, 72, 0.5) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 50%, rgba(30, 5, 5, 0.4) 0%, transparent 50%),
                #0d0d0d;
        }

        /* Bat silhouettes via CSS */
        .bats {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 180px;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .bat {
            position: absolute;
            font-size: 1.2rem;
            opacity: 0.18;
            animation: batFly linear infinite;
        }

        .bat:nth-child(1) {
            top: 12%;
            left: 8%;
            animation-duration: 8s;
            animation-delay: 0s;
        }

        .bat:nth-child(2) {
            top: 6%;
            left: 25%;
            animation-duration: 11s;
            animation-delay: 2s;
            font-size: 0.9rem;
        }

        .bat:nth-child(3) {
            top: 18%;
            left: 55%;
            animation-duration: 9s;
            animation-delay: 1s;
        }

        .bat:nth-child(4) {
            top: 4%;
            left: 72%;
            animation-duration: 13s;
            animation-delay: 3s;
            font-size: 0.8rem;
        }

        .bat:nth-child(5) {
            top: 14%;
            left: 88%;
            animation-duration: 7s;
            animation-delay: 0.5s;
        }

        .bat:nth-child(6) {
            top: 22%;
            left: 40%;
            animation-duration: 10s;
            animation-delay: 4s;
            font-size: 1rem;
        }

        @keyframes batFly {
            0% {
                transform: translateX(0) translateY(0) scaleX(1);
            }

            25% {
                transform: translateX(20px) translateY(-8px) scaleX(1);
            }

            50% {
                transform: translateX(0px) translateY(0px) scaleX(-1);
            }

            75% {
                transform: translateX(-20px) translateY(-6px) scaleX(-1);
            }

            100% {
                transform: translateX(0) translateY(0) scaleX(1);
            }
        }

        /* Spider webs corners */
        .web-tl,
        .web-tr {
            position: fixed;
            top: 0;
            width: 120px;
            height: 120px;
            z-index: 1;
            pointer-events: none;
            opacity: 0.12;
        }

        .web-tl {
            left: 0;
        }

        .web-tr {
            right: 0;
            transform: scaleX(-1);
        }

        /* ── Header ── */
        .header {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 0px 20px !important;
            width: 100%;
        }

        .header-title {
            font-size: clamp(1.8rem, 6vw, 2.6rem);
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 3px;
            text-shadow:
                0 0 20px rgba(180, 0, 0, 0.6),
                0 2px 4px rgba(0, 0, 0, 0.8);
            font-family: 'El Messiri', sans-serif;
        }

        .header-title::after {
            content: '';
            display: block;
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #8b1a1a, #c0392b, #8b1a1a, transparent);
            margin: 10px auto 0;
        }

        /* ── Main container ── */
        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 420px;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            animation: fadeSlideUp 0.5s ease forwards;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── Control Card ── */
        .control-card {
            background: var(--card-bg);
            border: 1px solid rgba(139, 26, 26, 0.4);
            border-radius: 18px;
            overflow: hidden;
            backdrop-filter: blur(16px);
            box-shadow:
                0 8px 40px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }

        .card-header {
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(139, 26, 26, 0.25);
            background: rgba(139, 26, 26, 0.08);
        }

        .card-icon {
            width: 34px;
            height: 34px;
            background: #003443;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            border: 1px solid #0b6680;
            flex-shrink: 0;
        }

        .card-title {
            color: #e8c0a0;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .card-body {
            padding: 20px 18px;
            text-align: center;
            margin: auto;
            align-items: center;
            justify-content: space-between;
            display: flex;
            color: white !important;
            text-align: right;
        }

        /* ── Counter Row ── */
        .counter-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
        }

        .counter-label {
            color: rgba(255, 255, 255, 0.75);
            font-size: 1rem;
            font-weight: 600;
            flex: 1;
            text-align: right;
        }

        .counter-control {
            display: flex;
            align-items: center;
            gap: 0;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid #003443;
            border-radius: 12px;
            overflow: hidden;
        }

        .counter-btn {
            width: 42px;
            height: 42px;
            background: #003443;
            border: none;
            color: #e8c0a0;
            font-size: 1.3rem;
            cursor: pointer;
            font-family: 'El Messiri', sans-serif;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .counter-btn:hover {
            background: #003443;
            color: #fff;
        }

        .counter-btn:active {
            transform: scale(0.92);
        }

        .counter-value {
            width: 54px;
            height: 42px;
            background: rgba(0, 0, 0, 0.5);
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: 700;
            text-align: center;
            border: none;
            border-right: 1px solid #003443;
            border-left: 1px solid #003443;
            outline: none;
            font-family: 'Cairo', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Players visual row */
        .players-visual {
            display: flex;
            gap: 6px;
            margin-top: 12px;
            justify-content: center;
            flex-wrap: wrap;
            min-height: 36px;
        }

        .player-icon {
            font-size: 1.4rem;
            transition: all 0.3s ease;
            animation: popIn 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes popIn {
            from {
                transform: scale(0);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* ── Code input card ── */
        .code-card .card-body {
            padding: 20px 18px 22px;
        }

        .code-hint {
            color: white;
            font-size: 0.75rem;
            text-align: center;
            margin-top: 10px;
            line-height: 1.6;
        }

        .code--input-wrap {
            position: relative;
        }

        .code--input {
            width: 100%;
            background: rgba(0, 0, 0, 0.55);
            border: 2px solid #003443;
            border-radius: 12px;
            padding: 13px 16px;
            color: #e8c0a0;
            font-family: 'Cairo', monospace;
            margin-bottom: 5px;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 4px;
            outline: none;
            text-align: center;
            transition: all 0.25s;
        }

        .code--input::placeholder {
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 2px;
            font-size: 0.9rem;
            font-weight: 400;
        }

        .code--input:focus {
            border-color: rgba(200, 60, 60, 0.7);
            background: rgba(50, 0, 0, 0.4);
            box-shadow: 0 0 0 3px rgba(139, 26, 26, 0.15), 0 0 20px rgba(139, 26, 26, 0.2);
        }

        /* ── Save button ── */
        .save-btn {
            width: 100%;
            padding: 15px;
            background: #003443;
            border: 1px solid #003443;
            border-radius: 14px;
            color: #ffffff;
            font-family: 'El Messiri', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(139, 26, 26, 0.4);
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px #003443;
            background: #003443;
        }

        .save-btn:active {
            transform: translateY(0);
        }

        .save-btn .btn-shine {
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transform: skewX(-20deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% {
                left: -100%;
            }

            50%,
            100% {
                left: 150%;
            }
        }

        /* ── Back button ── */
        .back-btn {
            display: block;
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.82rem;
            cursor: pointer;
            background: none;
            border: none;
            font-family: 'El Messiri', sans-serif;
            margin-top: 4px;
            transition: color 0.2s;
            letter-spacing: 0.5px;
            width: 100%;
            padding: 8px;
        }

        .back-btn:hover {
            color: #e8c0a0;
        }

        /* ── Success overlay ── */
        .success-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 999;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
        }

        .success-overlay.active {
            display: flex;
        }

        .success-box {
            background: linear-gradient(135deg, #1a0000, #0d0d0d);
            border: 1px solid #003443;
            border-radius: 22px;
            padding: 40px 30px;
            text-align: center;
            max-width: 320px;
            width: 90%;
            animation: popIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 0 60px rgba(139, 26, 26, 0.3);
        }

        .success-icon {
            font-size: 3.5rem;
            display: block;
            margin-bottom: 14px;
        }

        .success-title {
            color: #e8c0a0;
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .success-sub {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.88rem;
            line-height: 1.7;
            margin-bottom: 24px;
        }

        .success-details {
            background: rgba(139, 26, 26, 0.12);
            border: 1px solid rgba(139, 26, 26, 0.25);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            text-align: right;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .success-detail-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .success-detail-row span:last-child {
            color: #e8c0a0;
            font-weight: 700;
        }

        .success-go-btn {
            display: inline-block;
            padding: 12px 32px;
            background: #003443;
            border-radius: 12px;
            color: #ffffff;
            font-family: 'El Messiri', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: all 0.25s;
            letter-spacing: 1px;
        }

        .success-go-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(192, 57, 43, 0.45);
        }

        /* ── Divider ── */
        .section-divider {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 4px;
        }

        .section-divider::before,
        .section-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(139, 26, 26, 0.4), transparent);
        }

        .section-divider span {
            color: rgba(139, 26, 26, 0.6);
            font-size: 0.7rem;
            letter-spacing: 2px;
            white-space: nowrap;
        }

        /* error shake */
        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-6px);
            }

            40% {
                transform: translateX(6px);
            }

            60% {
                transform: translateX(-4px);
            }

            80% {
                transform: translateX(4px);
            }
        }

        .shake {
            animation: shake 0.4s ease;
        }

        #myVideo {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100% !important;
            min-height: 99% !important;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: fill !important;
            z-index: 1;
            width: 100% !important;
            height: 100% !important;
        }

        .lantern {
            z-index: 99;
            font-size: 2.4rem;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 0 8px rgba(232, 203, 154, 0.5));
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) rotate(-5deg);
            }

            50% {
                transform: translateY(-8px) rotate(5deg);
            }
        }

        .lantern img {
            width: 50px;
            filter: drop-shadow(0 0 8px rgba(232, 203, 154, 0.5));
        }

        .main-btn,
        .copy-btn {
            display: inline-block;
            padding: 12px 25px;
            background: #003443;
            border-radius: 12px;
            color: #ffffff;
            font-family: 'El Messiri', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: all 0.25s;
            width: 50%;
            letter-spacing: 1px;
        }

        .code-btns {
            display: flex;
            align-items: center;
            width: 100%;
            gap: 5px;
        }

        .counter-control-container {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .badge-label {
            background: #00060b;
            color: white;
            font-size: 15px;
            width: 100%;
            padding: 6px 14px;
            border-radius: 10px;
        }


        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 50% 0%, rgba(80, 0, 0, 0.35) 0%, transparent 60%),
                radial-gradient(ellipse at 20% 80%, rgba(10, 35, 72, 0.5) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 50%, rgba(30, 5, 5, 0.4) 0%, transparent 50%),
                #0d0d0d;
        }

        }

        .bat:nth-child(2) {

        }

        }

        }

        }

        @keyframes batFly {

            }

            }

            }
        }

        /* ── Header ── */
        .header {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 28px 20px 10px;
            width: 100%;
        }

        .header-title {
            font-size: clamp(1.8rem, 6vw, 2.4rem);
            font-weight: 700;
            color: #fff;
            letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(180, 0, 0, 0.6), 0 2px 4px rgba(0, 0, 0, 0.8);
        }

        .header-title::after {

        }

        .header-sub {
            color: white;
            font-size: .78rem;
            margin-top: 6px;
            letter-spacing: 2px;
        }

        /* ── Container ── */
        .container {
            position: relative;

        .card-title {
            color: #e8c0a0;

            font-weight: 600;
            letter-spacing: .5px;
        }

        .card-body {
            padding: 20px 18px;
        }

        /* ── Teams Grid ── */
        .teams-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .team-card {
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid var(--team-color, #003443);
            border-radius: 14px;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            position: relative;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        /* Glow on joined */
        .team-card.joined {
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 20px color-mix(in srgb, var(--team-color) 30%, transparent);
        }

        /* Corner shine */
        .team-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--team-color, #003443), transparent);
            opacity: 0.6;
        }

        /* Avatar circle */
        .team-avatar {
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            position: relative;
            transition: all 0.3s;
        }

        @keyframes avatarPulse {

            0%,
            100% {
                box-shadow: 0 0 10px color-mix(in srgb, var(--team-color) 40%, transparent);
            }

            50% {
                box-shadow: 0 0 22px color-mix(in srgb, var(--team-color) 70%, transparent);
            }
        }

        /* Joined checkmark badge */
        .avatar-badge {
            position: absolute;
            bottom: -2px;
            left: -2px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #1a3a1a;
            border: 2px solid #2d7a2d;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .65rem;
            opacity: 0;
            transform: scale(0);
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .team-card.joined .avatar-badge {
            opacity: 1;
            transform: scale(1);
        }

        /* Team name */
        .team-name {
            color: var(--team-color, #e8c0a0);
            font-size: .95rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-align: center;
        }

        /* Status badge */
        .team-status {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: .72rem;
            font-weight: 600;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s;
        }

        .team-status.waiting {
            background: rgba(100, 60, 0, 0.3);
            border: 1px solid rgba(180, 120, 0, 0.3);
            color: rgba(255, 200, 80, 0.7);
        }

        .team-status.joined-status {
            background: rgba(0, 80, 0, 0.3);
            border: 1px solid rgba(0, 160, 0, 0.4);
            color: #6dcc6d;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        .team-status.waiting .status-dot {
            animation: dotBlink 1.2s ease-in-out infinite;
        }

        @keyframes dotBlink {

            0%,
            100% {
                opacity: .3;
            }

            50% {
                opacity: 1;
            }
        }

        /* Simulate button (demo only) */
        .team-toggle {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: rgba(255, 255, 255, 0.4);
            font-family: 'Cairo', sans-serif;
            font-size: .68rem;
            padding: 3px 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .team-toggle:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        /* ── Timer Card ── */
        .timer-card .card-body {
            padding: 24px 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
        }

        /* Circular timer */
        .timer-circle-wrap {
            position: relative;
            width: 70px;
            height: 70px;
        }

        .timer-svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .timer-track {
            fill: none;
            stroke: rgba(0, 52, 67, 0.4);
            stroke-width: 7;
        }

        .timer-progress {
            fill: none;
            stroke: #003443;
            stroke-width: 7;
            stroke-linecap: round;
            stroke-dasharray: 345;
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear, stroke 0.5s;
        }

        .timer-center {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }

        .timer-number {
            font-family: 'Cairo', monospace;
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            line-height: 1;
            transition: color 0.5s;
        }

        .timer-label {
            font-size: .65rem;
            color: white;
            letter-spacing: 2px;
        }

        /* Timer controls */
        .timer-controls {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .timer-btn {
            flex: 1;
            padding: 11px;
            border-radius: 12px;
            border: none;
            font-family: 'El Messiri', sans-serif;
            font-size: .9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
            position: relative;
            overflow: hidden;
        }

        .timer-btn.start {
            background: #003443;
            color: #fff;
            border: 1px solid #005566;
            box-shadow: 0 4px 16px rgba(0, 52, 67, 0.5);
        }

        .timer-btn.start:hover {
            background: #004d63;
            transform: translateY(-1px);
        }

        .timer-btn.reset {
            background: rgba(139, 26, 26, 0.2);
            color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(139, 26, 26, 0.3);
        }

        .timer-btn.reset:hover {
            background: rgba(139, 26, 26, 0.35);
            color: #fff;
        }

        /* Timer finished flash */
        @keyframes timerFlash {

            0%,
            100% {
                background: rgba(139, 26, 26, 0.1);
            }

            50% {
                background: rgba(139, 26, 26, 0.35);
            }
        }

        .timer-finished {
            animation: timerFlash .6s ease-in-out infinite;
        }

        /* ── Teams status summary ── */
        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 100%;
        }

        .summary-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: .8rem;
        }

        .summary-value {
            color: #e8c0a0;
            font-size: .85rem;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
        }

        /* Shake */
        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-6px);
            }

            40% {
                transform: translateX(6px);
            }

            60% {
                transform: translateX(-4px);
            }

            80% {
                transform: translateX(4px);
            }
        }

        .shake {
            animation: shake .4s ease;
        }

        @keyframes popIn {
            from {
                transform: scale(0);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .code-hint {
            text-align: center;
            color: white;
            margin-top: 9px;
            font-size: 15px;
        }

        #wait {
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            transform: translate(-49%, 4%);
            object-fit: fill;
            z-index: 1;
            height: 400px;
            position: relative;
            width: 100%;
            top: 71%;
            border: 5px solid #30181e;
            border-radius: 15px;
        }

        div:where(.swal2-container) h2:where(.swal2-title) {
            font-size: 18px !important;
        }

        div:where(.swal2-container) div:where(.swal2-popup) {
            background: #000000 !important;
            color: #ffffff !important;
        }

        div:where(.swal2-container) button:where(.swal2-styled):where(.swal2-confirm):hover,
        div:where(.swal2-container) button:where(.swal2-styled):where(.swal2-confirm),
        div:where(.swal2-icon).swal2-error {
            background-color: red !important;
            font-family: 'El Messiri', sans-serif !important;
        }

        .withdrawal {
            background-color: red !important;
            border: 1px solid red !important;
        }
    </style>
</head>
