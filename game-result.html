<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نتائج المغامرة</title>
    <link rel="icon" type="image/png" href="images/fav.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@400..700&family=Cairo:wght@300..900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --card-bg: rgba(0, 20, 40, 0.88);
            --teal: #003443;
            --gold: #e8cb9a;
            --red-team: #c0392b;
            --blue-team: #2471a3;
            --green-team: #1e8449;
            --yellow-team: #b7950b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'El Messiri', sans-serif;
            background: #0d0d0d;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
            padding-bottom: 60px;
            width: 100%;
        }

        /* ── Background ── */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 50% 0%, rgba(80, 0, 0, 0.4) 0%, transparent 60%),
                radial-gradient(ellipse at 20% 80%, rgba(10, 35, 72, 0.5) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 50%, rgba(30, 5, 5, 0.4) 0%, transparent 50%),
                #0d0d0d;
        }

        /* ── Bats ── */
        .bats {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 180px;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .bat {
            position: absolute;
            font-size: 1.2rem;
            opacity: 0.15;
            animation: batFly linear infinite;
        }

        .bat:nth-child(1) {
            top: 12%;
            left: 8%;
            animation-duration: 8s;
        }

        .bat:nth-child(2) {
            top: 6%;
            left: 25%;
            animation-duration: 11s;
            animation-delay: 2s;
            font-size: .9rem;
        }

        .bat:nth-child(3) {
            top: 18%;
            left: 55%;
            animation-duration: 9s;
            animation-delay: 1s;
        }

        .bat:nth-child(4) {
            top: 4%;
            left: 72%;
            animation-duration: 13s;
            animation-delay: 3s;
            font-size: .8rem;
        }

        .bat:nth-child(5) {
            top: 14%;
            left: 88%;
            animation-duration: 7s;
            animation-delay: .5s;
        }

        @keyframes batFly {
            0% {
                transform: translateX(0) translateY(0) scaleX(1);
            }

            25% {
                transform: translateX(20px) translateY(-8px) scaleX(1);
            }

            50% {
                transform: translateX(0) translateY(0) scaleX(-1);
            }

            75% {
                transform: translateX(-20px) translateY(-6px) scaleX(-1);
            }

            100% {
                transform: translateX(0) translateY(0) scaleX(1);
            }
        }

        /* ── Video BG ── */
        #myVideo {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 99%;
            width: 100%;
            height: 100%;
            transform: translate(-50%, -50%);
            object-fit: fill;
            z-index: 1;
        }

        /* ── Header ── */
        .header {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 30px 20px 6px;
            width: 100%;
        }

        .header-title {
            font-size: clamp(1.8rem, 6vw, 2.4rem);
            font-weight: 700;
            color: #fff;
            letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(180, 0, 0, 0.6), 0 2px 4px rgba(0, 0, 0, 0.8);
        }

        .header-title::after {
            content: '';
            display: block;
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #8b1a1a, #c0392b, #8b1a1a, transparent);
            margin: 10px auto 0;
        }

        .header-sub {
            color: rgba(255, 255, 255, 0.35);
            font-size: .78rem;
            margin-top: 6px;
            letter-spacing: 2px;
        }

        /* ── Lantern logo ── */
        .lantern {
            z-index: 99;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 0 8px rgba(232, 203, 154, 0.5));
        }

        .lantern img {
            width: 50px;
            filter: drop-shadow(0 0 8px rgba(232, 203, 154, 0.5));
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) rotate(-5deg);
            }

            50% {
                transform: translateY(-8px) rotate(5deg);
            }
        }

        /* ── Back btn ── */
        .back-btn-wrap {
            position: fixed;
            z-index: 99999;
            right: 5%;
            top: 3%;
        }

        .back-img {
            width: 40px;
            cursor: pointer;
        }

        /* ── Main container ── */
        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 460px;
            margin-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* ── Podium row (1st place special) ── */
        .podium-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            animation: revealDown .6s ease both;
        }

        /* ── Result card ── */
        .result-card {
            background: var(--card-bg);
            border: 2px solid var(--team-color, #003443);
            border-radius: 20px;
            /* overflow: hidden; */
            backdrop-filter: blur(16px);
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.03),
                0 8px 40px rgba(0, 0, 0, .65),
                0 0 30px color-mix(in srgb, var(--team-color) 18%, transparent);
            width: 100%;
            animation: revealDown .5s ease both;
            position: relative;
        }

        /* Top glow bar */
        .result-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--team-color), transparent);
            opacity: .8;
        }

        /* Rank label in corner */
        .rank-corner {
            position: absolute;
            top: -13px;
            left: 40%;
            font-size: .7rem;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            color: var(--team-color);
            letter-spacing: 1px;
            background: #e4e4e4;
            border-radius: 7px;
            padding: 1px 3px;
        }

        .result-card.first {
            --team-color: var(--red-team);
            animation-delay: .1s;
        }

        .result-card.second {
            --team-color: var(--blue-team);
            animation-delay: .25s;
        }

        .result-card.third {
            --team-color: var(--green-team);
            animation-delay: .4s;
        }

        .result-card.fourth {
            --team-color: var(--yellow-team);
            animation-delay: .55s;
        }

        /* First place is bigger */
        .result-card.first {
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.05),
                0 12px 50px rgba(0, 0, 0, .7),
                0 0 50px color-mix(in srgb, var(--red-team) 30%, transparent);
        }

        /* ── Card inner layout ── */
        .card-inner {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 16px 16px 20px;
        }

        /* ── Rank badge ── */
        .rank-badge {
            width: 44px;
            height: 44px;
            flex-shrink: 0;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid var(--team-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: 900;
            font-family: 'Cairo', sans-serif;
            color: var(--team-color);
            box-shadow: inset 0 0 12px color-mix(in srgb, var(--team-color) 20%, transparent);
        }

        .rank-badge img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .result-card.first .rank-badge {
            width: 52px;
            height: 52px;
            font-size: 1.8rem;
            border-radius: 14px;
            background: color-mix(in srgb, var(--team-color) 15%, #000);
            animation: badgePulse 2s ease-in-out infinite;
        }

        @keyframes badgePulse {

            0%,
            100% {
                box-shadow: inset 0 0 12px color-mix(in srgb, var(--team-color) 20%, transparent), 0 0 10px color-mix(in srgb, var(--team-color) 30%, transparent);
            }

            50% {
                box-shadow: inset 0 0 18px color-mix(in srgb, var(--team-color) 35%, transparent), 0 0 22px color-mix(in srgb, var(--team-color) 50%, transparent);
            }
        }

        /* ── Players avatars cluster ── */
        .avatars {
            display: flex;
            flex-direction: row;
            gap: -8px;
            flex-shrink: 0;
        }

        .avatar {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: 2px solid var(--team-color);
            overflow: hidden;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            box-shadow: 0 0 10px color-mix(in srgb, var(--team-color) 40%, transparent);
            margin-left: -10px;
            position: relative;
        }

        .avatar:first-child {
            margin-left: 0;
        }

        .result-card.first .avatar {
            width: 54px;
            height: 54px;
            font-size: 1.6rem;
            border-width: 3px;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        /* ── Team info ── */
        .team-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }

        .team-title {
            color: var(--team-color);
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: .5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .result-card.first .team-title {
            font-size: 1.15rem;
        }

        .team-players {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .player-name {
            color: rgba(255, 255, 255, 0.7);
            font-size: .78rem;
            font-family: 'Cairo', sans-serif;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .player-name::before {
            content: '';
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--team-color);
            flex-shrink: 0;
            opacity: .7;
        }

        /* ── Score ── */
        .score-wrap {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .score-number {
            font-family: 'Cairo', monospace;
            font-size: 1.8rem;
            font-weight: 900;
            line-height: 1;
            color: #fff;
            text-shadow: 0 0 16px color-mix(in srgb, var(--team-color) 60%, transparent);
        }

        .result-card.first .score-number {
            font-size: 2.2rem;
        }

        .score-label {
            font-size: .62rem;
            color: rgba(255, 255, 255, .35);
            letter-spacing: 1.5px;
            font-family: 'Cairo', sans-serif;
        }

        /* ── Crown for 1st ── */
        .crown {
            font-size: 1.6rem;
            animation: crownFloat 2.5s ease-in-out infinite;
            filter: drop-shadow(0 0 8px rgba(232, 203, 154, 0.7));
            display: none;
        }

        .result-card.first+.crown,
        .first-crown {
            display: block;
        }

        @keyframes crownFloat {

            0%,
            100% {
                transform: translateY(0) rotate(-5deg);
            }

            50% {
                transform: translateY(-5px) rotate(5deg);
            }
        }

        /* ── Divider between cards ── */
        .rank-divider {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 10px;
            opacity: .4;
        }

        .rank-divider::before,
        .rank-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(139, 26, 26, .6), transparent);
        }

        .rank-divider span {
            color: rgba(139, 26, 26, .7);
            font-size: .65rem;
            letter-spacing: 2px;
        }

        /* ── Bottom action ── */
        .action-btn {
            width: 100%;
            padding: 15px;
            background: #003443;
            border: 1px solid #005566;
            border-radius: 14px;
            color: #fff;
            font-family: 'El Messiri', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            transition: all .3s ease;
            box-shadow: 0 4px 20px rgba(0, 52, 67, .5);
            z-index: 10;
            animation: revealDown .7s ease .7s both;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(0, 84, 107, .6);
            background: #004d63;
        }

        .action-btn .btn-shine {
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .12), transparent);
            transform: skewX(-20deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% {
                left: -100%
            }

            50%,
            100% {
                left: 150%
            }
        }

        /* ── Animations ── */
        @keyframes revealDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes popIn {
            from {
                transform: scale(0);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* ── Confetti particles for 1st ── */
        .confetti-wrap {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            overflow: hidden;
        }

        .confetti-piece {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 2px;
            opacity: 0;
            animation: confettiFall linear infinite;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(-20px) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(110vh) rotate(720deg);
                opacity: 0;
            }
        }

        .back-btn-left {
            position: fixed;
            z-index: 99999;
            left: 5%;
            top: 3%;
        }
    </style>
</head>

<body>
    <!-- Video background -->
    <div style="width:100%;height:100%;">
        <video id="myVideo" loop autoplay muted>
            <source src="./assets/video-2.mp4" type="video/mp4">
        </video>
    </div>

    <div class="bg-layer"></div>

    <!-- Confetti -->
    <div class="confetti-wrap" id="confettiWrap"></div>

    <!-- Back button -->
    <div class="back-btn-wrap">
        <a href="play.html">
            <img src="images/next.png" class="back-img" alt="">
        </a>
    </div>

    <div class="back-btn-left">
        <a href="index.html">
            <img src="images/home-kh.png" class="back-img" alt="">
        </a>
    </div>


    <!-- Header -->
    <div class="header">
        <div class="header-title">نتائج المغامرة</div>
        <div class="header-sub">ترتيب الفرق النهائي</div>
    </div>

    <span class="lantern">
        <img src="images/animated-logo2.gif" alt="">
    </span>

    <!-- Results -->
    <div class="container" id="resultsContainer"></div>

    <script>
        // ══════════════════════════════════════════════
        //  DATA — edit this to match your actual results
        // ══════════════════════════════════════════════
        const results = [
            {
                rank: 1,
                title: 'الفريق الأحمر',
                color: '#c0392b',
                score: 9200,
                medal: 'assets/gold.png',
                players: [
                    { name: 'احمد محمد', img: 'images/avatar1.png' },
                    { name: 'سارة علي', img: 'images/avatar2.png' },
                ],
            },
            {
                rank: 2,
                title: 'الفريق الأزرق',
                color: '#2471a3',
                score: 7850,
                medal: 'assets/silver.png',
                players: [
                    { name: 'خالد عمر', img: 'images/avatar3.png' },
                ],
            },
            {
                rank: 3,
                title: 'الفريق الأخضر',
                color: '#1e8449',
                score: 6400,
                medal: 'assets/bronze.png',
                players: [
                    { name: 'فاطمة حسن', img: 'images/avatar4.png' },
                    { name: 'يوسف نادر', img: 'images/avatar5.png' },
                ],
            },
            {
                rank: 4,
                title: 'الفريق الأصفر',
                color: '#b7950b',
                score: 4100,
                medal: 'images/fav.png',
                players: [
                    { name: 'ليلى كمال', img: 'images/avatar6.png' },
                ],
            },
        ];

        const rankClass = ['first', 'second', 'third', 'fourth'];
        const rankLabel = ['المركز الأول', 'المركز الثاني', 'المركز الثالث', 'المركز الرابع'];

        function buildAvatars(players, color) {
            return players.map(p => `
                <div class="avatar">
                    <img src="${p.img}"
                         alt="${p.name}"
                         onerror="this.style.display='none'; this.parentElement.textContent='👤'">
                </div>
            `).join('');
        }

        function buildPlayerNames(players) {
            return players.map(p => `
                <div class="player-name">${p.name}</div>
            `).join('');
        }

        function render() {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = '';

            results.forEach((team, i) => {
                // Crown above 1st
                if (i === 0) {
                    const crown = document.createElement('div');
                    container.appendChild(crown);
                }

                const card = document.createElement('div');
                card.className = `result-card ${rankClass[i]}`;
                card.style.setProperty('--team-color', team.color);

                card.innerHTML = `
                    <div class="rank-corner">${rankLabel[i]}</div>
                    <div class="card-inner">

                        <div class="rank-badge">
                        <img src="${team.medal}" alt="${team.title}">
                            </div>

                        <div class="avatars">
                            ${buildAvatars(team.players, team.color)}
                        </div>

                        <div class="team-info">
                            <div class="team-title">${team.title}</div>
                            <div class="team-players">
                                ${buildPlayerNames(team.players)}
                            </div>
                        </div>
                    </div>
                `;

                container.appendChild(card);

                // Divider between cards (not after last)
                if (i < results.length - 1) {
                    const div = document.createElement('div');
                    div.className = 'rank-divider';
                    div.innerHTML = `<span>VS</span>`;
                    container.appendChild(div);
                }
            });
        }

        // ── Confetti for winner ──
        function spawnConfetti() {
            const wrap = document.getElementById('confettiWrap');
            const colors = [results[0].color, '#e8cb9a', '#ffffff', '#c0392b', '#f39c12'];
            for (let i = 0; i < 35; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.cssText = `
                    left:${Math.random() * 100}%;
                    background:${colors[Math.floor(Math.random() * colors.length)]};
                    width:${6 + Math.random() * 6}px;
                    height:${6 + Math.random() * 6}px;
                    border-radius:${Math.random() > .5 ? '50%' : '3px'};
                    animation-duration:${3 + Math.random() * 4}s;
                    animation-delay:${Math.random() * 5}s;
                `;
                wrap.appendChild(piece);
            }
        }

        render();
        spawnConfetti();
    </script>
</body>

</html>
