<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تتابع الفيديو</title>
    <link rel="icon" type="image/png" href="images/fav.png" />
    <link href="style.css" rel="stylesheet" type="text/css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&family=El+Messiri:wght@400..700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #0a2348;
            font-family: 'El Messiri', sans-serif !important;
            direction: rtl;
        }

        .splash-wrapper {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            background: #0a0a0a;
        }

        .splash img.splash {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            inset: 0;
        }

        .loader-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 40px 50px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.95) 0%, rgba(0, 0, 0, 0.6) 70%, transparent 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        .percent-display {
            font-family: 'El Messiri', sans-serif !important;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -2px;
            line-height: 1;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
            transition: all 0.1s ease;
        }

        .percent-display span {
            font-size: 0.45em;
            font-weight: 300;
            opacity: 0.7;
            margin-right: 4px;
        }

        .progress-track {
            width: 100%;
            max-width: 420px;
            height: 3px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #c0a060, #ffe8a0, #c0a060);
            background-size: 200% 100%;
            border-radius: 10px;
            transition: width 0.08s linear;
            animation: shimmer 1.5s linear infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        .loading-label {
            font-size: 0.78rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.45);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .splash-wrapper.fade-out {
            animation: fadeOut 0.6s ease forwards;
        }

        @keyframes fadeOut {
            0% {
                opacity: 1;
                transform: scale(1);
            }

            100% {
                opacity: 0;
                transform: scale(1.03);
            }
        }

        h1 {
            position: fixed;
            margin-top: 120px;
            color: white;
            font-size: 21px;
            text-align: center;
            font-weight: normal;
        }

        .description {
            width: 90%;
            max-width: 500px;
            font-size: 14px;
            margin-top: 198px;
        }

        /* ===== BUTTONS WRAPPER ===== */
        .login-redirect {
            position: relative;
        }

        /* ===== زر اقبل المغامرة ===== */
        #login {
            position: fixed;
            bottom: 45%;
            color: #e8cb9a;
            z-index: 99999999;
            right: -36%;
            transform: translateX(-50%);
            font-size: 17px;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            font-family: 'El Messiri', sans-serif !important;
            background-color: blue;
            width: 200px;
            text-align: center;
            text-decoration: none;
            padding: 5px;
            transition: all 0.25s ease;
            height: 200px;
            clip-path: circle(50% at right);
        }

        #login:hover {
            background-color: #004d62;
            box-shadow: 0 4px 18px rgba(0, 52, 67, 0.6);
        }

        /* ===== صور جمب زر اقبل المغامرة ===== */
        .right-img-1 {
            position: fixed;
            bottom: 31.5%;
            left: 68%;
            transform: translateX(-50%);
            width: 30px;
            z-index: 99999999999998;
        }

        .left-img-1 {
            position: fixed;
            bottom: 58.5%;
            right: 22.7%;
            transform: translateX(50%);
            width: 30px;
            z-index: 99999999999998;
        }

        /* ===== زر لعب خاص ===== */
        #private-login {
            position: fixed;
            bottom: 45%;
            color: #e8cb9a;
            z-index: 99999999;
            left: 16%;
            transform: translateX(-50%);
            font-size: 17px;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            font-family: 'El Messiri', sans-serif !important;
            background-color: #003443;
            width: 200px;
            text-align: center;
            text-decoration: none;
            padding: 5px;
            transition: all 0.25s ease;
            height: 200px;
            clip-path: circle(50% at left);

        }

        #private-login:hover {
            background-color: #22a855;
            border-color: rgba(100, 220, 130, 0.7);
            box-shadow: 0 4px 18px rgba(34, 168, 85, 0.45);
        }

        /* ===== صور جمب زر لعب خاص ===== */
        .right-img-2 {
            position: fixed;
            bottom: 58.5%;
            left: 21%;
            transform: translateX(-50%);
            width: 30px;
            z-index: 99999999999998;
        }

        .left-img-2 {
            position: fixed;
            bottom: 23.5%;
            right: 67.7%;
            transform: translateX(50%);
            width: 30px;
            z-index: 99999999999998;
        }

        /* ===== Responsive ===== */
        @media (min-width: 768px) {

            #login,
            #private-login {
                width: 220px;
            }

            .right-img-1,
            .right-img-2 {
                left: 64% !important;
            }

            .left-img-1,
            .left-img-2 {
                right: 55% !important;
            }
        }

        .back-img {
            width: 40px;
            height: 40px;
            cursor: pointer;
        }

        .back-btn {
            position: fixed;
            z-index: 999999999;
            right: 5%;
            top: 3%;
        }

        #myVideo {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100% !important;
            min-height: 99% !important;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: fill !important;
            z-index: 1;
            width: 100% !important;
            height: 100% !important;
        }

        .header-logo {
            display: flex;
            justify-content: center;
        }

        .logo {
            z-index: 999;
            position: relative;
            width: 150px;
            height: 200px;
            align-items: center;
            justify-content: center;
            display: flex;
            margin: auto;
        }

        #login div {
            transform: rotate(270deg);
            position: relative;
            top: 77px;
            right: -40px;
        }


        #private-login div {
            transform: rotate(270deg);
            position: relative;
            top: 77px;
            left: -40px;
        }

        .sound {
            width: 40px;
            height: 40px;
            position: fixed;
            top: 3%;
            left: 3%;
        }

        .sound img {
            width: 100%;
            height: 100%;
        }

        /* ✅ تنسيق الزر */
        #soundBtn {
            position: fixed;
            top: 3%;
            left: 3%;
            z-index: 999999999;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            width: 40px;
            height: 40px;
        }

        #soundBtn img {
            width: 100%;
            height: 100%;
        }


        /* ── Timer Card ── */
        .timer-card .card-body {
            padding: 24px 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
        }

        /* Circular timer */
        .timer-circle-wrap {
            position: relative;
            width: 140px;
            height: 140px;
        }

        .timer-svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .timer-track {
            fill: none;
            stroke: rgba(0, 52, 67, 0.4);
            stroke-width: 7;
        }

        .timer-progress {
            fill: none;
            stroke: #003443;
            stroke-width: 7;
            stroke-linecap: round;
            stroke-dasharray: 345;
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear, stroke 0.5s;
        }

        .timer-center {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }

        .timer-number {
            font-family: 'Cairo', monospace;
            font-size: 2.4rem;
            font-weight: 700;
            color: #fff;
            line-height: 1;
            transition: color 0.5s;
        }

        .timer-label {
            font-size: .65rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
        }

        /* Timer controls */
        .timer-controls {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .timer-btn {
            flex: 1;
            padding: 11px;
            border-radius: 12px;
            border: none;
            font-family: 'El Messiri', sans-serif;
            font-size: .9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
            position: relative;
            overflow: hidden;
        }

        .timer-btn.start {
            background: #003443;
            color: #fff;
            border: 1px solid #005566;
            box-shadow: 0 4px 16px rgba(0, 52, 67, 0.5);
        }

        .timer-btn.start:hover {
            background: #004d63;
            transform: translateY(-1px);
        }

        .timer-btn.reset {
            background: rgba(139, 26, 26, 0.2);
            color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(139, 26, 26, 0.3);
        }

        .timer-btn.reset:hover {
            background: rgba(139, 26, 26, 0.35);
            color: #fff;
        }

        /* Timer finished flash */
        @keyframes timerFlash {

            0%,
            100% {
                background: rgba(139, 26, 26, 0.1);
            }

            50% {
                background: rgba(139, 26, 26, 0.35);
            }
        }

        .timer-finished {
            animation: timerFlash .6s ease-in-out infinite;
        }

        .withdrawal {
            background-color: red !important;
            border: 1px solid red !important;
        }

        /* ── Save button ── */
        .save-btn {
            margin: auto;
            width: 50%;
            padding: 15px;
            background: #003443;
            border: 1px solid #003443;
            border-radius: 14px;
            color: #ffffff;
            font-family: 'El Messiri', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            z-index: 999;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(139, 26, 26, 0.4);
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px #003443;
            background: #003443;
        }

        .save-btn:active {
            transform: translateY(0);
        }

        .save-btn .btn-shine {
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transform: skewX(-20deg);
            animation: shine 3s infinite;
        }

        .card-title {
            text-align: center;
            color: white;
            justify-content: center;
            display: flex;
        }
    </style>
</head>

<body>


    <!-- ✅ زر الصوت منفصل تماماً -->
    <button id="soundBtn" onclick="toggleSound()">
        <img src="images/sound-off.png" id="soundIcon" alt="">
    </button>

    <div class="header-logo">
        <img src="images/animated-logo2.gif" class="logo splash" alt="">
    </div>
    <div class="control-card timer-card" style="position: relative; z-index: 999999;">
        <div class="card-header">
            <span class="card-title">بانتظار الفرق الثانية للاختيار</span>
        </div>
        <div class="card-body">

            <div class="timer-circle-wrap">
                <svg class="timer-svg" viewBox="0 0 120 120">
                    <circle class="timer-track" cx="60" cy="60" r="55" />
                    <circle class="timer-progress" cx="60" cy="60" r="55" id="timerArc" />
                </svg>
                <div class="timer-center">
                    <span class="timer-number" id="timerDisplay">120</span>
                    <span class="timer-label">ثانية</span>
                </div>
            </div>

        </div>
    </div>
    <div class="container">
        <button class="save-btn withdrawal" onclick="openModal()">
            <span class="btn-shine"></span>
            انسحاب
        </button>
    </div>
        <div style="position: relative; z-index: 9; margin-top: 15px;" class="card-header">
            <span class="card-title">🔴 الفريق الاحمر</span>
        </div>
        <div style="position: relative; z-index: 9;" class="card-header">
            <span class="card-title">🕹️ المتحكم احمد محمد </span>
        </div>
    <div class="login-redirect">
        <a href="challange.html" style="bottom: 3% !important;" id="login">
            <div style="font-size: 50px;
    top: 57px;
    font-family: cursive;
    right: -36px;">X</div>
        </a>
        <img src="images/left.png" class="left-img-1" style="bottom: 16% !important;" alt="">

        <img src="images/right.png" style="bottom: 16% !important;" class="right-img-2" alt="">
        <a href="private.html" style="background-color: purple; bottom: 3% !important;" id="private-login">
            <div style="font-size: 57px; top: 58px; font-family: monospace; left: -34px;">&#9633;</div>
        </a>
    </div>

    <div class="login-redirect">
        <a href="challange.html" style="background-color: red;" id="login">
            <div style="font-size: 57px; top: 58px; font-family: monospace;">O</div>
        </a>
        <img src="images/left.png" class="left-img-1" alt="">

        <img src="images/right.png" class="right-img-2" alt="">
        <a href="private.html" style="background-color: green;" id="private-login">
            <div style="font-size: 47px;top: 58px;font-family: monospace;left: -35px;">&#9651;</div>
        </a>
    </div>

    <div style="width: 100%; height: 100%;">
        <!-- صوت منفصل -->
        <audio id="mySound" loop autoplay>
            <source src="./images/sound.ogg" volume="0.5" type="audio/ogg">
        </audio>

        <video id="myVideo" loop autoplay muted>
            <source src="./assets/video-2.mp4" type="video/mp4">
        </video>
    </div>

    <script>
        const sound = document.getElementById('mySound');
        const soundIcon = document.getElementById('soundIcon');

        // الصوت يبدأ متوقف (المتصفح يمنع التشغيل التلقائي)
        sound.volume = 1;
        sound.pause();
        let isMuted = true;

        function toggleSound() {
            isMuted = !isMuted;

            if (isMuted) {
                sound.pause();
                soundIcon.src = 'images/sound-off.png';
            } else {
                sound.play();
                soundIcon.src = 'images/sound-on.png';
            }
        }
    </script>

</body>

</html>
