<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تتابع الفيديو</title>
    <link rel="icon" type="image/png" href="images/fav.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&family=El+Messiri:wght@400..700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #0a2348;
            font-family: 'El Messiri', sans-serif !important;
            direction: rtl;
            width: 100vw;
            height: 100vh;
        }

        /* ─── VIDEO BACKGROUND ─── */
        #myVideo {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: 100%;
            height: 100%;
            transform: translate(-50%, -50%);
            object-fit: cover;
            z-index: 1;
        }

        /* ─── OVERLAY ─── */
        .overlay {
            position: fixed;
            inset: 0;
            z-index: 2;
            background: rgba(0, 0, 0, 0.35);
        }

        /* ─── ALL UI ─── */
        .ui-layer {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            /* padding: clamp(8px, 2vw, 20px) clamp(10px, 3vw, 30px); */
        }

        /* ─── SOUND BTN ─── */
        #soundBtn {
            position: fixed;
            top: clamp(8px, 2vw, 16px);
            left: clamp(8px, 2vw, 16px);
            z-index: 999;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            cursor: pointer;
            padding: 0;
            width: clamp(36px, 5vw, 48px);
            height: clamp(36px, 5vw, 48px);
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            transition: background 0.2s;
        }

        #soundBtn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        #soundBtn img {
            width: 60%;
            height: 60%;
            object-fit: contain;
        }

        /* ─── HEADER / LOGO ─── */
        .header-logo {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .logo {
            width: clamp(80px, 15vw, 150px);
            height: auto;
        }

        /* ─── TIMER SECTION ─── */
        .timer-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(6px, 1.5vh, 14px);
            width: 100%;
        }

        .card-title {
            text-align: center;
            color: white;
            font-size: clamp(13px, 2.5vw, 20px);
            font-weight: 600;
        }

        .timer-circle-wrap {
            position: relative;
            width: clamp(90px, 15vw, 140px);
            height: clamp(90px, 15vw, 140px);
        }

        .timer-svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .timer-track {
            fill: none;
            stroke: rgba(0, 52, 67, 0.4);
            stroke-width: 7;
        }

        .timer-progress {
            fill: none;
            stroke: #c0a060;
            stroke-width: 7;
            stroke-linecap: round;
            stroke-dasharray: 345;
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear, stroke 0.5s;
        }

        .timer-center {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }

        .timer-number {
            font-family: 'Cairo', monospace;
            font-size: clamp(1.4rem, 4vw, 2.4rem);
            font-weight: 700;
            color: #fff;
            line-height: 1;
        }

        .timer-label {
            font-size: clamp(.5rem, 1.2vw, .65rem);
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
        }

        /* ─── TEAM INFO ─── */
        .team-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(3px, 0.8vh, 8px);
        }

        .team-info .card-title {
            font-size: clamp(14px, 2.8vw, 22px);
        }

        /* ─── BUTTONS AREA ─── */
        .buttons-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(6px, 1.5vh, 14px);
        }

        /* ─── BUTTON ROWS ─── */
        .btn-row {
            width: 100%;
            height: clamp(120px, 28vw, 260px);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* ─── ARROW POSITIONING ─── */
        .arrow-near-right {
            position: absolute;
            right: clamp(90px, 20vw, 210px);
            z-index: 2;
        }

        .arrow-near-left {
            position: absolute;
            left: clamp(90px, 20vw, 210px);
            z-index: 2;
        }

        /* ─── HALF-CIRCLE BUTTONS ─── */
        .choice-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e8cb9a;
            text-decoration: none;
            cursor: pointer;
            font-family: 'El Messiri', sans-serif;
            font-weight: bold;
            transition: filter 0.25s;
            position: absolute;
            overflow: hidden;
            width: clamp(120px, 28vw, 260px);
            height: clamp(120px, 28vw, 260px);
        }

        .choice-btn:hover {
            filter: brightness(1.3);
        }

        .choice-btn .btn-icon {
            font-size: clamp(36px, 9vw, 90px);
            line-height: 1;
            pointer-events: none;
        }

        /* RIGHT edge: half circle opening to the left */
        .btn-left {
            clip-path: circle(50% at right);
            right: 0;
            left: auto;
        }

        .btn-left .btn-icon {
            margin-right: -57%;
        }

        /* LEFT edge: half circle opening to the right */
        .btn-right {
            clip-path: circle(50% at left);
            left: 0;
            right: auto;
        }

        .btn-right .btn-icon {
            margin-left: -57%;
        }

        /* Colors */
        .btn-blue {
            background-color: blue;
        }

        .btn-purple {
            background-color: purple;
        }

        .btn-red {
            background-color: #cc0000;
        }

        .btn-green {
            background-color: #22a855;
        }

        /* ─── ARROW IMAGES ─── */
        .arrow-img {
            width: clamp(18px, 2.5vw, 30px);
            height: auto;
            flex-shrink: 0;
        }

        /* ─── WITHDRAWAL BUTTON ─── */
        .withdrawal-btn {
            padding: clamp(8px, 1.5vh, 15px) clamp(20px, 4vw, 40px);
            background: #cc0000;
            border: 1px solid #ff2222;
            border-radius: 14px;
            color: #ffffff;
            font-family: 'El Messiri', sans-serif;
            font-size: clamp(14px, 2.5vw, 20px);
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(200, 0, 0, 0.4);
            margin-bottom: 15px;
        }

        .withdrawal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(200, 0, 0, 0.5);
        }

        /* ─── AUDIO ─── */
        audio {
            display: none;
        }

        /* ─── PORTRAIT adjustments (tall phones) ─── */
        @media (max-aspect-ratio: 3/4) {
            .btn-row {
                height: clamp(130px, 38vw, 220px);
            }

            .choice-btn {
                width: clamp(130px, 38vw, 220px);
                height: clamp(130px, 38vw, 220px);
            }

            .choice-btn .btn-icon {
                font-size: clamp(34px, 10vw, 70px);
            }

            .buttons-area {
                gap: clamp(4px, 2vh, 12px);
            }
        }

        /* ─── Very small screens ─── */
        @media (max-width: 360px) {
            .choice-btn {
                width: 110px;
                height: 110px;
            }

            .btn-icon {
                font-size: 28px !important;
            }
        }
    </style>
</head>

<body>

    <!-- Sound Button -->
    <button id="soundBtn" onclick="toggleSound()">
        <img src="images/sound-off.png" id="soundIcon" alt="">
    </button>

    <!-- Video Background -->
    <video id="myVideo" loop autoplay muted playsinline>
        <source src="./assets/video-2.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <!-- UI Layer -->
    <div class="ui-layer">

        <!-- Logo -->
        <div class="header-logo">
            <img src="images/animated-logo2.gif" class="logo" alt="">
        </div>

        <!-- Timer -->
        <div class="timer-section">
            <div class="card-title">بانتظار الفرق الثانية للاختيار</div>
            <div class="timer-circle-wrap">
                <svg class="timer-svg" viewBox="0 0 120 120">
                    <circle class="timer-track" cx="60" cy="60" r="55" />
                    <circle class="timer-progress" cx="60" cy="60" r="55" id="timerArc" />
                </svg>
                <div class="timer-center">
                    <span class="timer-number" id="timerDisplay">120</span>
                    <span class="timer-label">ثانية</span>
                </div>
            </div>
        </div>

        <!-- Team Info -->
        <div class="team-info">
            <div class="card-title">🔴 الفريق الاحمر</div>
            <div class="card-title">🕹️ المتحكم احمد محمد</div>
        </div>

        <!-- Buttons -->
        <div class="buttons-area">

            <!-- Row 1: Blue / Purple -->
            <div class="btn-row">
                <a href="challange.html" class="choice-btn btn-left btn-blue">
                    <span class="btn-icon" style="font-family:cursive;">X</span>
                </a>
                <img src="images/right.png" class="arrow-img arrow-near-left" alt="">
                <img src="images/left.png" class="arrow-img arrow-near-right" alt="">
                <a href="private.html" class="choice-btn btn-right btn-purple">
                    <span class="btn-icon" style="font-family:monospace;">&#9633;</span>
                </a>
            </div>

            <!-- Row 2: Red / Green -->
            <div class="btn-row">
                <a href="challange.html" class="choice-btn btn-left btn-red">
                    <span class="btn-icon" style="font-family:monospace;">O</span>
                </a>
                <img src="images/right.png" class="arrow-img arrow-near-left" alt="">
                <img src="images/left.png" class="arrow-img arrow-near-right" alt="">
                <a href="private.html" class="choice-btn btn-right btn-green">
                    <span class="btn-icon" style="font-family:monospace;">&#9651;</span>
                </a>
            </div>

            <!-- Withdrawal -->
            <button class="withdrawal-btn" onclick="openModal()">انسحاب</button>

        </div>

    </div>

    <!-- Audio -->
    <audio id="mySound" loop>
        <source src="./images/sound.ogg" type="audio/ogg">
    </audio>

    <script>
        const sound = document.getElementById('mySound');
        const soundIcon = document.getElementById('soundIcon');
        sound.volume = 1;
        sound.pause();
        let isMuted = true;

        function toggleSound() {
            isMuted = !isMuted;
            if (isMuted) {
                sound.pause();
                soundIcon.src = 'images/sound-off.png';
            } else {
                sound.play();
                soundIcon.src = 'images/sound-on.png';
            }
        }

        // Timer
        const TOTAL = 120;
        let remaining = TOTAL;
        const display = document.getElementById('timerDisplay');
        const arc = document.getElementById('timerArc');
        const circumference = 345;

        function updateTimer() {
            display.textContent = remaining;
            const offset = circumference * (1 - remaining / TOTAL);
            arc.style.strokeDashoffset = offset;
            if (remaining <= 0) {
                clearInterval(timerInterval);
                arc.style.stroke = '#cc0000';
            } else if (remaining <= 30) {
                arc.style.stroke = '#cc4400';
            }
            remaining--;
        }

        updateTimer();
        const timerInterval = setInterval(updateTimer, 1000);

        function openModal() {
            // placeholder
            alert('تأكيد الانسحاب؟');
        }
    </script>

</body>

</html>
