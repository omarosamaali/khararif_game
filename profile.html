<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الملف الشخصي</title>
    <link rel="icon" type="image/png" href="images/fav.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&family=El+Messiri:wght@400..700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow-x: hidden;
            overflow-y: auto;
            background: #0a2348;
            font-family: 'El Messiri', sans-serif;
            direction: rtl;
            min-height: 100vh;
        }

        .bg-wrapper {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .bg-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.35;
        }

        .bg-wrapper::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(10, 35, 72, 0.7) 0%, rgba(0, 20, 50, 0.88) 100%);
        }

        /* Header */
        .logo-area {
            position: fixed;
            top: 0;
            z-index: 9;
            width: 100%;
            background: #092143;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding-top: 17px;
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(232, 203, 154, 0.12);
        }

        .logo-area img.logo {
            width: 80px;
            filter: drop-shadow(0 4px 15px rgba(232, 203, 154, 0.4));
        }

        .page-title {
            color: #dfa888;
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            letter-spacing: 1px;
        }

        .page-subtitle {
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            text-align: center;
            font-weight: 400;
            padding-bottom: 4px;
        }

        .back-btn {
            position: fixed;
            z-index: 99;
            right: 5%;
            top: 17px;
            cursor: pointer;
        }

        .back-btn img {
            width: 40px;
        }

        .back-btn-svg {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Page */
        .page {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px 60px;
        }

        /* Avatar area */
        .avatar-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 22px;
            margin-top: 8px;
        }

        .avatar-ring {
            position: relative;
            width: 100px;
            height: 100px;
            margin-bottom: 12px;
        }

        .avatar-ring::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: conic-gradient(#dfa888, rgba(223, 168, 136, 0.2), #dfa888);
            animation: rotateBorder 3s linear infinite;
        }

        @keyframes rotateBorder {
            to {
                transform: rotate(360deg);
            }
        }

        .avatar-inner {
            position: absolute;
            inset: 3px;
            border-radius: 50%;
            background: rgba(0, 30, 60, 0.9);
            border: 2px solid #092143;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            z-index: 1;
        }

        .avatar-inner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-inner svg {
            width: 44px;
            height: 44px;
        }

        .avatar-edit {
            position: absolute;
            bottom: 4px;
            left: 4px;
            z-index: 2;
            width: 28px;
            height: 28px;
            background: #dfa888;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid #092143;
            transition: transform 0.2s;
        }

        .avatar-edit:hover {
            transform: scale(1.1);
        }

        .avatar-edit svg {
            width: 13px;
            height: 13px;
        }

        .avatar-name {
            color: #dfa888;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .avatar-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(223, 168, 136, 0.1);
            border: 1px solid rgba(223, 168, 136, 0.3);
            border-radius: 20px;
            padding: 3px 12px;
            color: rgba(223, 168, 136, 0.75);
            font-size: 12px;
        }

        /* Stats row */
        .stats-row {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 420px;
            margin-bottom: 20px;
        }

        .stat-card {
            flex: 1;
            background: rgba(0, 30, 60, 0.75);
            border: 1px solid rgba(232, 203, 154, 0.15);
            border-radius: 12px;
            padding: 14px 10px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .stat-value {
            color: #dfa888;
            font-size: 20px;
            font-weight: 700;
            line-height: 1.2;
        }

        .stat-label {
            color: white;
            font-size: 9px;
            margin-top: 3px;
        }

        /* Card */
        .card {
            background: rgba(0, 30, 60, 0.75);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(232, 203, 154, 0.2);
            border-radius: 16px;
            padding: 30px 24px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: fadeUp 0.5s ease both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Section title */
        .section-title {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #dfa888;
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .section-title svg {
            width: 18px;
            height: 18px;
        }

        /* Form groups */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            text-align: center !important;
            color: #dfa888;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 7px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
                        text-align: center !important;

        }

        .input-wrapper .icon {
            position: absolute;
            right: 12px;
            width: 18px;
            height: 18px;
            opacity: 0.5;
            pointer-events: none;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(232, 203, 154, 0.25);
            border-radius: 8px;
            color: #ffffff;
            font-family: 'El Messiri', sans-serif;
            font-size: 14px;
            padding: 11px 42px 11px 14px;
            outline: none;
            transition: border-color 0.25s, background 0.25s;
            -webkit-appearance: none;
            appearance: none;
            text-align: center !important;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.28);
            font-size: 13px;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #dfa888;
            background: rgba(255, 255, 255, 0.1);
        }

        .form-group input[readonly] {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .form-group select option {
            background: #0a2348;
            color: #fff;
        }

        /* Toggle password */
        .toggle-pass {
            position: absolute;
            left: 12px;
            cursor: pointer;
            opacity: 0.45;
            transition: opacity 0.2s;
            background: none;
            border: none;
            padding: 0;
            display: flex;
            align-items: center;
        }

        .toggle-pass:hover {
            opacity: 0.9;
        }

        .toggle-pass svg {
            width: 17px;
            height: 17px;
        }

        /* Divider */
        .divider {
            border: none;
            border-top: 1px solid rgba(232, 203, 154, 0.12);
            margin: 22px 0;
        }

        /* Country row */
        .country-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(232, 203, 154, 0.25);
            border-radius: 8px;
            padding: 10px 12px;
            width: 100%;
            margin-bottom: 18px;
        }

        .country-row select {
            color: #fff;
            border: none;
            width: 100%;
            font-family: 'El Messiri', sans-serif;
            background: transparent;
            outline: none;
            text-align: right;
            font-size: 14px;
        }

        .country-row select option {
            background: #0a2348;
        }

        /* Passcode */
        .passcode-wrapper {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .code-input {
            flex: 1;
            max-width: 60px;
            height: 52px;
            background: #122c49;
            border: 1px solid rgba(232, 203, 154, 0.25);
            border-radius: 8px;
            color: #dfa888;
            font-family: 'El Messiri', sans-serif;
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            outline: none;
            transition: border-color 0.25s;
            caret-color: #dfa888;
        }

        .code-input:focus {
            border-color: rgba(223, 168, 136, 0.7);
        }

        /* Msg */
        .msg {
            display: none;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            text-align: center;
        }

        .msg.error {
            background: rgba(200, 50, 50, 0.2);
            border: 1px solid rgba(200, 50, 50, 0.4);
            color: #ff9999;
        }

        .msg.success {
            background: rgba(50, 180, 100, 0.2);
            border: 1px solid rgba(50, 180, 100, 0.4);
            color: #88ffbb;
        }

        /* Danger zone */
        .danger-row {
            display: flex;
            gap: 10px;
            margin-top: 6px;
        }

        .btn-danger {
            flex: 1;
            background: rgba(180, 40, 40, 0.15);
            border: 1px solid rgba(200, 60, 60, 0.35);
            border-radius: 8px;
            color: #ff9090;
            font-family: 'El Messiri', sans-serif;
            font-size: 13px;
            font-weight: 600;
            padding: 10px;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-danger:hover {
            background: rgba(200, 50, 50, 0.25);
        }

        .btn-danger svg {
            width: 15px;
            height: 15px;
        }

        /* Submit button */
        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #003443, #00556a);
            border: 1px solid rgba(232, 203, 154, 0.4);
            border-radius: 8px;
            color: #dfa888;
            font-family: 'El Messiri', sans-serif;
            font-size: 16px;
            font-weight: 700;
            padding: 13px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-submit:hover {
            opacity: 0.88;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        .btn-submit.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .spinner {
            width: 17px;
            height: 17px;
            border: 2px solid rgba(223, 168, 136, 0.3);
            border-top-color: #dfa888;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        .btn-submit.loading .spinner {
            display: block;
        }

        .btn-submit.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .btn-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-row img {
            width: 28px;
            opacity: 0.85;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-box {
            background: rgba(5, 25, 55, 0.98);
            border: 1px solid rgba(232, 203, 154, 0.25);
            border-radius: 16px;
            padding: 30px 24px;
            width: 90%;
            max-width: 340px;
            text-align: center;
            animation: fadeUp 0.3s ease both;
        }

        .modal-icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }

        .modal-icon.warn {
            background: rgba(200, 60, 60, 0.15);
            border: 1px solid rgba(200, 60, 60, 0.4);
        }

        .modal-icon svg {
            width: 26px;
            height: 26px;
        }

        .modal-title {
            color: #dfa888;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .modal-sub {
            color: rgba(255, 255, 255, 0.45);
            font-size: 13px;
            line-height: 1.8;
            margin-bottom: 22px;
        }

        .modal-btns {
            display: flex;
            gap: 10px;
        }

        .modal-btn-cancel {
            flex: 1;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: rgba(255, 255, 255, 0.6);
            font-family: 'El Messiri', sans-serif;
            font-size: 14px;
            font-weight: 600;
            padding: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-btn-confirm {
            flex: 1;
            background: rgba(180, 40, 40, 0.3);
            border: 1px solid rgba(200, 60, 60, 0.5);
            border-radius: 8px;
            color: #ff9090;
            font-family: 'El Messiri', sans-serif;
            font-size: 14px;
            font-weight: 600;
            padding: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-btn-cancel:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        .modal-btn-confirm:hover {
            background: rgba(200, 50, 50, 0.4);
        }

        /* Hidden file input */
        #avatarInput {
            display: none;
        }
    </style>
</head>

<body>

    <div class="bg-wrapper">
        <img src="images/splash-2.png" alt="">
    </div>

    <!-- Header -->
    <div class="logo-area">
        <div class="back-btn" onclick="history.back()">
            <div style="width:36px;height:36px;display:flex;align-items:center;justify-content:center;">
                <img src="images/next.png" class="back-img" alt="">

            </div>
        </div>
        <img class="logo" src="images/animated-logo-ii.gif" alt="logo" onerror="this.style.display='none'">
        <div class="page-title">بيانات المغامر</div>
        <div class="page-subtitle">إدارة بياناتك الشخصية</div>
    </div>

    <div class="page" style="margin-top: 190px;">

        <!-- Avatar -->
        <a href="avatar.html">

            <div class="avatar-area">
                <div class="avatar-ring">
                <div class="avatar-inner">
                    <img src="assets/بديح.png" alt="avatar">
                </div>
                    <div class="avatar-edit" onclick="document.getElementById('avatarInput').click()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#092143" stroke-width="2.5">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                        </svg>
                    </div>
                </div>
        </a>
        <!-- <input type="file" id="avatarInput" accept="image/*" onchange="previewAvatar(this)"> -->
        <div class="avatar-name" id="displayName">أحمد محمد</div>

    </div>

    <!-- Stats -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-value">13</div>
            <div class="stat-label">مرات الربح</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">53</div>
            <div class="stat-label">مرات الخسارة</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">12</div>
            <div class="stat-label">عدد الانسحاب</div>
        </div>
    </div>

    <div class="card">

        <div class="msg" id="formMsg"></div>

        <!-- Personal Info -->
        <div class="section-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="#dfa888" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
            </svg>
            المعلومات الشخصية
        </div>

        <!-- الاسم الكامل -->
        <div class="form-group">
            <label>بماذا نناديك</label>
            <div class="input-wrapper">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#dfa888" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
                <input type="text" id="fullname" value="أحمد محمد" oninput="updateDisplayName(this.value)">
            </div>
        </div>

        <!-- البريد -->
        <div class="form-group">
            <label>البريد الإلكتروني</label>
            <div class="input-wrapper">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#dfa888" stroke-width="2">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                    <polyline points="22,6 12,13 2,6" />
                </svg>
                <input type="email" id="email" value="ahmed@example.com" style="direction:ltr;text-align:right;">
            </div>
        </div>

        <!-- رقم الهاتف -->
        <div class="form-group">
            <label>رقم الهاتف</label>
            <div class="input-wrapper">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#dfa888" stroke-width="2">
                    <path
                        d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.35 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z" />
                </svg>
                <input type="tel" id="phone" value="+20 100 000 0000" style="direction:ltr;text-align:right;">
            </div>
        </div>

        <!-- الدولة -->
        <div class="form-group">
            <label>الدولة</label>
            <div class="country-row">
                <img id="country-flag" src="https://flagcdn.com/w40/eg.png" alt="علم"
                    style="width:30px;height:20px;border:1px solid rgba(255,255,255,0.1);border-radius:2px;">
                <select id="country-list">
                    <option value="EG" selected>مصر</option>
                    <option value="SA">السعودية</option>
                    <option value="AE">الإمارات</option>
                    <option value="KW">الكويت</option>
                    <option value="QA">قطر</option>
                    <option value="BH">البحرين</option>
                    <option value="OM">عمان</option>
                    <option value="JO">الأردن</option>
                    <option value="LB">لبنان</option>
                    <option value="SY">سوريا</option>
                    <option value="IQ">العراق</option>
                    <option value="PS">فلسطين</option>
                    <option value="LY">ليبيا</option>
                    <option value="DZ">الجزائر</option>
                    <option value="MA">المغرب</option>
                    <option value="TN">تونس</option>
                    <option value="SD">السودان</option>
                    <option value="YE">اليمن</option>
                    <option value="SO">الصومال</option>
                    <option value="MR">موريتانيا</option>
                    <option value="DJ">جيبوتي</option>
                    <option value="KM">جزر القمر</option>
                </select>
            </div>
        </div>

        <hr class="divider">

        <!-- Security -->
        <div class="section-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="#dfa888" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
            الأمان
        </div>

        <!-- رمز المرور -->
        <div class="form-group">
            <label>رمز المرور</label>
            <div class="passcode-wrapper">
                <input type="text" style="padding: 5px 15px 11px 14px;" maxlength="1" class="code-input" value="3">
                <input type="text" style="padding: 5px 15px 11px 14px;" maxlength="1" class="code-input" value="3">
                <input type="text" style="padding: 5px 15px 11px 14px;" maxlength="1" class="code-input" value="3">
                <input type="text" style="padding: 5px 15px 11px 14px;" maxlength="1" class="code-input" value="5">
            </div>
        </div>

        <!-- Save button -->
        <div class="btn-row" style="margin-bottom: 24px;">
            <img src="images/right.png" alt="" onerror="this.style.display='none'">
            <button class="btn-submit" id="saveBtn" onclick="saveProfile()">
                <div class="spinner"></div>
                <span class="btn-text">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="17" height="17"
                        style="vertical-align:middle;margin-left:4px;">

            </div>

    <!-- Delete Modal -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal-box">

            <div class="modal-sub">هذا الإجراء لا يمكن التراجع عنه. سيتم حذف حسابك وجميع بياناتك نهائياً.</div>
            <div class="modal-btns">
                <button class="modal-btn-cancel" onclick="hideModal('deleteModal')">إلغاء</button>
                <button class="modal-btn-confirm" onclick="hideModal('deleteModal')">نعم، احذف حسابي</button>
            </div>
        </div>
    </div>

    <script>
        // Avatar preview
        function previewAvatar(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    const circle = document.getElementById('avatarCircle');
                    circle.innerHTML = `<img src="${e.target.result}" alt="avatar">
                        <div class="avatar-edit" onclick="document.getElementById('avatarInput').click()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="#092143" stroke-width="2.5" width="13" height="13">
                                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                            </svg>
                        </div>`;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Update display name
        function updateDisplayName(val) {
            document.getElementById('displayName').textContent = val || 'اسم المستخدم';
        }

        // Country flag
        document.getElementById('country-list').addEventListener('change', e => {
            const code = e.target.value;
            const flag = document.getElementById('country-flag');
            if (code) {
                flag.src = `https://flagcdn.com/w40/${code.toLowerCase()}.png`;
                flag.style.display = 'block';
            }
        });

        // Passcode inputs
        const codeInputs = document.querySelectorAll('.code-input');
        codeInputs.forEach((inp, i, arr) => {
            inp.addEventListener('focus', () => { inp.value = ''; inp.type = 'text'; });
            inp.addEventListener('blur', () => { if (inp.value) inp.type = 'password'; });
            inp.addEventListener('input', () => {
                inp.value = inp.value.replace(/\D/g, '').slice(0, 1);
                if (inp.value && i < arr.length - 1) arr[i + 1].focus();
            });
            inp.addEventListener('keydown', e => {
                if (e.key === 'Backspace' && !inp.value && i > 0) arr[i - 1].focus();
            });
        });

        // Toggle password
        // function togglePw(id, btn) {
        //     const inp = document.getElementById(id);
        //     const svg = btn.querySelector('svg');
        //     if (inp.type === 'password') {
        //         inp.type = 'text';
        //         svg.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;
        //     } else {
        //         inp.type = 'password';
        //         svg.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
        //     }
        // }

        // Show message
        function showMsg(text, type) {
            const msg = document.getElementById('formMsg');
            msg.textContent = text;
            msg.className = 'msg ' + type;
            msg.style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
            setTimeout(() => { msg.style.display = 'none'; }, 4000);
        }

        // Save profile
        function saveProfile() {
            const btn = document.getElementById('saveBtn');
            const pw1 = document.getElementById('newPw').value;
            const pw2 = document.getElementById('confirmPw').value;

            if (pw1 && pw1 !== pw2) {
                showMsg('كلمتا المرور غير متطابقتين', 'error');
                return;
            }

            btn.classList.add('loading');
            setTimeout(() => {
                btn.classList.remove('loading');
                showMsg('تم حفظ التغييرات بنجاح ✓', 'success');
            }, 1600);
        }

        // Modals
        function showModal(type) {
            document.getElementById(type + 'Modal').classList.add('show');
        }

        function hideModal(id) {
            document.getElementById(id).classList.remove('show');
        }

        // Close modal on overlay click
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', e => {
                if (e.target === overlay) overlay.classList.remove('show');
            });
        });
    </script>
