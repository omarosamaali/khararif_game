<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تتابع الفيديو - التفاصيل</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@400..700&family=Cairo:wght@300..900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --gold: #e8cb9a;
            --gold-light: #ffe8a0;
            --gold-dark: #c0a060;
            --dark-navy: #0a2348;
            --darker-navy: #060f22;
            --teal: #003443;
            --teal-light: #005566;
            --card-bg: rgba(0, 30, 60, 0.85);
            --glass: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'El Messiri', sans-serif;
            background: var(--darker-navy);
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(0, 80, 120, 0.4) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(10, 35, 72, 0.6) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 52, 67, 0.3) 0%, transparent 70%);
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(1px 1px at 10% 15%, rgba(255, 255, 255, 0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 30% 40%, rgba(255, 255, 255, 0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 50% 10%, rgba(255, 255, 255, 0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 70% 25%, rgba(255, 255, 255, 0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 90% 60%, rgba(255, 255, 255, 0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 15% 70%, rgba(255, 255, 255, 0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 85% 85%, rgba(255, 255, 255, 0.4) 0%, transparent 100%),
                radial-gradient(2px 2px at 45% 55%, rgba(232, 203, 154, 0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 60% 75%, rgba(255, 255, 255, 0.2) 0%, transparent 100%);
            z-index: 0;
            animation: twinkle 4s ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            0% {
                opacity: 0.6;
            }

            100% {
                opacity: 1;
            }
        }

        .header {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 12px 20px 20px;
        }

        .header h1 {
            font-size: clamp(1.6rem, 5vw, 2.4rem);
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 2px;
            text-shadow: 0 0 30px rgba(232, 203, 154, 0.4);
        }

        .header h1::after {
            content: '';
            display: block;
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 10px auto 0;
        }

        .header .subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            margin-top: 6px;
            letter-spacing: 1px;
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 480px;
            margin: 0 auto;
            padding: 172px 16px 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(232, 203, 154, 0.2);
            border-radius: 18px;
            overflow: hidden;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 50px rgba(0, 0, 0, 0.5);
        }

        .card-header {
            padding: 16px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(232, 203, 154, 0.1);
        }

        .card-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--teal), var(--teal-light));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            border: 1px solid rgba(232, 203, 154, 0.25);
        }

        .card-title {
            color: var(--gold);
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* PROFILE */
        .profile-card .profile-body {
            padding: 18px;
        }

        .profile-top {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .profile-avatar {
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-name {
            color: white;
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .profile-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(232, 203, 154, 0.1);
            border: 1px solid rgba(232, 203, 154, 0.25);
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 0.75rem;
            color: var(--gold);
        }

        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 14px;
        }

        .stat-box {
            background: rgba(0, 52, 67, 0.5);
            border: 1px solid rgba(232, 203, 154, 0.1);
            border-radius: 12px;
            padding: 10px 12px;
            text-align: center;
        }

        .stat-icon {
            font-size: 1.2rem;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: 700;
            line-height: 1;
        }

        .stat-value.win {
            color: #4ade80;
        }

        .stat-value.loss {
            color: #f87171;
        }

        .stat-label {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 2px;
        }

        /* NEWS */
        .news-card .news-body {
            padding: 14px;
        }

        .news-item {
            display: flex;
            gap: 12px;
            align-items: center;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .news-item:last-child {
            border-bottom: none;
        }

        .news-item:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .news-thumb {
            width: 64px;
            height: 64px;
            border-radius: 10px;
            background: linear-gradient(135deg, #003443, #004455);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            border: 1px solid rgba(232, 203, 154, 0.15);
            overflow: hidden;
        }

        .news-headline {
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.88rem;
            line-height: 1.5;
            font-weight: 500;
        }

        .news-date {
            color: rgba(232, 203, 154, 0.5);
            font-size: 0.72rem;
            margin-top: 4px;
        }

        .news-see-all {
            display: block;
            text-align: center;
            color: var(--gold);
            font-size: 0.82rem;
            padding: 8px;
            cursor: pointer;
            border-top: 1px solid rgba(232, 203, 154, 0.1);
            background: none;
            border-right: none;
            border-left: none;
            border-bottom: none;
            width: 100%;
            font-family: 'El Messiri', sans-serif;
            transition: color 0.2s;
        }

        .news-see-all:hover {
            color: var(--gold-light);
        }

        /* BALANCE */
        .balance-card {
            border-radius: 18px;
            overflow: visible;
            position: relative;
        }

        .balance-card-inner {
            background: var(--card-bg);
            border: 1px solid rgba(232, 203, 154, 0.2);
            border-radius: 18px;
            overflow: hidden;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
        }

        .balance-top {
            padding: 22px 18px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(232, 203, 154, 0.1);
        }

        .lantern {
            font-size: 2.4rem;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 0 8px rgba(232, 203, 154, 0.5));
        }

        .lantern img {
            width: 50px;
            filter: drop-shadow(0 0 8px rgba(232, 203, 154, 0.5));
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) rotate(-5deg);
            }

            50% {
                transform: translateY(-6px) rotate(5deg);
            }
        }

        .balance-info {
            flex: 1;
        }

        .balance-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
        }

        .balance-amount {
            color: var(--gold);
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .balance-currency {
            font-size: 0.85rem;
            opacity: 0.7;
        }

        .packages-section {
            padding: 16px;
        }

        .packages-title {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.75rem;
            text-align: center;
            letter-spacing: 1px;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .packages-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .package-row {
            display: grid;
            gap: 10px;
        }

        .package-row.cols-1 {
            grid-template-columns: 1fr;
        }

        .package-row.cols-2 {
            grid-template-columns: 1fr 1fr;
        }

        .package-row.cols-3 {
            grid-template-columns: 1fr 1fr 1fr;
        }

        .package-item {
            background: rgba(0, 52, 67, 0.6);
            border: 1px solid rgba(232, 203, 154, 0.15);
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s;
            position: relative;
        }

        .package-item:hover {
            border-color: rgba(232, 203, 154, 0.5);
            background: rgba(0, 70, 90, 0.7);
            transform: translateY(-2px);
        }

        .package-item.featured {
            border-color: rgba(232, 203, 154, 0.4);
            background: linear-gradient(135deg, rgba(0, 60, 80, 0.8), rgba(0, 40, 60, 0.8));
        }

        .package-item.featured::before {
            content: 'الأفضل';
            position: absolute;
            top: -10px;
            right: 50%;
            transform: translateX(50%);
            background: linear-gradient(90deg, var(--gold-dark), var(--gold-light));
            color: #0a2348;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .package-icon {
            font-size: 1.4rem;
            margin-bottom: 4px;
        }

        .package-amount {
            color: var(--gold);
            font-size: 0.95rem;
            font-weight: 700;
        }

        .package-games {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.72rem;
            margin-bottom: 4px;
        }

        .package-price {
            color: white;
            font-size: 0.82rem;
            font-weight: 600;
            background: rgba(232, 203, 154, 0.12);
            border-radius: 8px;
            padding: 2px 6px;
            display: inline-block;
            margin-top: 4px;
        }

        /* =================== MODALS =================== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: linear-gradient(135deg, #0a2348, #062030);
            border: 1px solid rgba(232, 203, 154, 0.3);
            bottom: 0px;
            position: fixed;
            width: 100%;
            max-width: 380px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            animation: slideUp 0.35s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-top {
            padding: 20px;
            border-bottom: 1px solid rgba(232, 203, 154, 0.15);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-title {
            color: var(--gold);
            font-size: 1.1rem;
            font-weight: 700;
        }

        .modal-close {
            width: 30px;
            height: 30px;
            background: rgba(255, 255, 255, 0.08);
            border: none;
            border-radius: 8px;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }

        /* NEWS MODAL */
        .news-modal-content {
            padding: 16px;
        }

        .news-modal-item {
            display: flex;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .news-modal-item:last-child {
            border-bottom: none;
        }

        .news-modal-item:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .news-modal-img {
            width: 72px;
            height: 72px;
            border-radius: 10px;
            background: linear-gradient(135deg, #003443, #004455);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            border: 1px solid rgba(232, 203, 154, 0.15);
        }

        .news-modal-title {
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.9rem;
            font-weight: 500;
            line-height: 1.5;
            margin-bottom: 4px;
        }

        .news-modal-date {
            color: rgba(232, 203, 154, 0.5);
            font-size: 0.72rem;
        }

        /* =================== PAYMENT MODAL =================== */
        #paymentModal .modal {
            max-width: 420px;
        }

        .payment-summary {
            margin: 16px 16px 0;
            background: linear-gradient(135deg, rgba(0, 52, 67, 0.8), rgba(0, 30, 60, 0.8));
            border: 1px solid rgba(232, 203, 154, 0.25);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .payment-pkg-icon {
            font-size: 2.2rem;
        }

        .payment-pkg-info {
            flex: 1;
        }

        .payment-pkg-name {
            color: white;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .payment-pkg-pts {
            color: var(--gold);
            font-size: 0.85rem;
        }

        .payment-pkg-price-badge {
            background: linear-gradient(135deg, var(--gold-dark), var(--gold));
            color: #0a2348;
            font-size: 1.1rem;
            font-weight: 800;
            padding: 8px 14px;
            border-radius: 10px;
            white-space: nowrap;
        }

        .payment-methods {
            padding: 16px;
        }

        .payment-methods-title {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.72rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 12px;
            text-align: center;
        }

        .methods-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 14px;
        }

        .method-btn {
            background: rgba(0, 52, 67, 0.5);
            border: 2px solid rgba(232, 203, 154, 0.15);
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s;
            color: rgba(255, 255, 255, 0.7);
            font-family: 'El Messiri', sans-serif;
            font-size: 0.85rem;
        }

        .method-btn:hover {
            border-color: rgba(232, 203, 154, 0.5);
            background: rgba(0, 70, 90, 0.7);
            color: white;
        }

        .method-btn.selected {
            border-color: var(--gold);
            background: rgba(0, 80, 100, 0.7);
            color: var(--gold);
        }

        .method-btn .method-icon {
            font-size: 1.6rem;
            margin-bottom: 5px;
        }

        .method-btn .method-name {
            font-size: 0.78rem;
        }

        /* Card form */
        .card-form {
            display: none;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 14px;
            animation: fadeIn 0.3s ease;
        }

        .card-form.visible {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-input {
            width: 100%;
            background: rgba(0, 30, 60, 0.6);
            border: 1px solid rgba(232, 203, 154, 0.2);
            border-radius: 10px;
            padding: 10px 14px;
            color: white;
            font-family: 'El Messiri', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
            direction: ltr;
            text-align: right;
        }

        .form-input:focus {
            border-color: rgba(232, 203, 154, 0.5);
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
            direction: rtl;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .pay-now-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #c0a060, #e8cb9a);
            border: none;
            border-radius: 12px;
            color: #062030;
            font-family: 'El Messiri', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .pay-now-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(232, 203, 154, 0.35);
        }

        .pay-now-btn:active {
            transform: translateY(0);
        }

        .pay-now-btn .btn-shine {
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transform: skewX(-20deg);
            animation: shine 2.5s infinite;
        }

        @keyframes shine {
            0% {
                left: -100%;
            }

            50%,
            100% {
                left: 150%;
            }
        }

        .secure-note {
            text-align: center;
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.72rem;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        /* Success screen */
        .success-screen {
            display: none;
            padding: 30px 20px;
            text-align: center;
            animation: fadeIn 0.4s ease;
        }

        .success-screen.visible {
            display: block;
        }

        .success-icon {
            font-size: 4rem;
            margin-bottom: 12px;
            animation: pop 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes pop {
            0% {
                transform: scale(0);
            }

            100% {
                transform: scale(1);
            }
        }

        .success-title {
            color: #4ade80;
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .success-sub {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
        }

        .success-close-btn {
            margin-top: 20px;
            padding: 10px 28px;
            background: rgba(0, 52, 67, 0.6);
            border: 1px solid rgba(232, 203, 154, 0.3);
            border-radius: 10px;
            color: var(--gold);
            font-family: 'El Messiri', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .success-close-btn:hover {
            background: rgba(0, 70, 90, 0.7);
        }

        /* =================== LOYALTY CARD BTN =================== */
        .loyalty-card-btn {
            margin-right: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            background: white;
            border: 1px solid rgba(100, 220, 130, 0.4);
            border-radius: 20px;
            padding: 5px 12px;
            color: #003443;
            font-family: 'El Messiri', sans-serif;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 2px 12px rgba(34, 168, 85, 0.3);
        }

        .loyalty-card-btn:hover {
            background: linear-gradient(135deg, #22a855, #2ecc70);
            transform: translateY(-1px);
            box-shadow: 0 4px 18px rgba(34, 168, 85, 0.45);
        }

        /* =================== LOYALTY CARD MODAL =================== */
        #loyaltyModal .modal {
            max-width: 400px;
            background: linear-gradient(160deg, #272323, #fbe5e5);
        }

        #loyaltyModal .modal-top {
            border-bottom-color: rgba(100, 220, 130, 0.15);
        }

        #loyaltyModal .modal-title {
            color: #fafafa;
        }

        .loyalty-card-wrap {
            padding: 20px 20px 10px;
        }

        /* The physical card - 3D flip container */
        .lc-card-scene {
            width: 100%;
            perspective: 800px;
            cursor: pointer;
        }

        .lc-card {
            width: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s ease;
        }

        .lc-card.is-flipped {
            transform: rotateY(180deg);
        }

        .lc-card-face {
            width: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 18px;
            overflow: hidden;
        }

        .lc-card-face img {
            width: 100%;
            display: block;
        }

        /* Back face is pre-rotated so it shows correctly when flipped */
        .lc-card-face.lc-back {
            position: absolute;
            top: 0;
            left: 0;
            transform: rotateY(180deg);
        }

        /* Intro spin animation — full spin then settle on front */
        @keyframes cardIntroSpin {
            0% {
                transform: rotateY(0deg);
            }

            40% {
                transform: rotateY(180deg);
            }

            65% {
                transform: rotateY(180deg);
            }

            100% {
                transform: rotateY(360deg);
            }
        }

        .lc-card.intro-spin {
            animation: cardIntroSpin 1.4s ease-in-out forwards;
            transition: none !important;
        }

        /* Stats below card */
        .lc-stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            padding: 14px 0 6px;
        }

        .lc-stat {
            background: black;
            color: white;
            border: 1px solid rgba(100, 220, 130, 0.15);
            border-radius: 12px;
            padding: 10px 8px;
            text-align: center;
        }

        .lc-stat-val {
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .lc-stat-lbl {
            color: rgba(255, 255, 255, 0.993);
            font-size: 0.65rem;
            margin-top: 2px;
        }

        .lc-footer-note {
            text-align: center;
            color: rgb(0, 0, 0);
            font-size: 0.7rem;
            padding: 0 0 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-6px);
            }

            40% {
                transform: translateX(6px);
            }

            60% {
                transform: translateX(-4px);
            }

            80% {
                transform: translateX(4px);
            }
        }

        .lc-card-info {
            position: absolute;
            top: 50%;
            left: 51%;
            transform: translate(-50%, -50%);
            display: flex;
            gap: 13px;
            width: 90%;
            color: white;
            align-items: center;
        }

        .avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            overflow: hidden;
        }

        .btn-main {
            width: 80%;
            margin: auto;
            background: linear-gradient(135deg, #003443, #00556a);
            border: 1px solid rgba(232, 203, 154, 0.4);
            border-radius: 10px;
            font-family: 'El Messiri', sans-serif;
            font-size: 16px;
            font-weight: 700;
            padding: 14px;
            cursor: pointer;
            letter-spacing: 1px;
            align-items: center;
            justify-content: center;
            display: flex;
            margin-top: 20px !important;
            margin-bottom: 20px !important;
            text-decoration: none;

            overflow: hidden;

        }

        .btn-shine {
            position: absolute;
            top: 0;
            left: -100%;
            width: 55%;
            height: 100%;
            background: linear-gradient(120deg,
                    transparent 0%,
                    rgba(255, 255, 255, 0.55) 50%,
                    transparent 100%);
            transform: skewX(-20deg);
            animation: btnShine 3.8s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes btnShine {
            0% {
                left: -100%;
                opacity: 0;
            }

            10% {
